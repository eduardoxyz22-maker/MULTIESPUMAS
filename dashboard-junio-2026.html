  <style>/* ========================================================
   Dashboard Comercial · Junio 2026
   Editorial executive style — warm cream + ink
   ======================================================== */

:root {
  /* Palette */
  --bg:        #f1ede4;
  --bg-elev:   #f7f4ec;
  --surface:   #ffffff;
  --surface-2: #faf7f1;
  --ink:       #14130f;
  --ink-700:   #3c3a33;
  --ink-500:   #5d5a52;
  --muted:     #8c887d;
  --rail:      #e6e1d6;
  --rail-2:    #d8d3c5;
  --hairline:  rgba(20, 19, 15, 0.08);
  --hairline-strong: rgba(20, 19, 15, 0.16);

  --good:      #4f7a3f;
  --warn:      #b07a1f;
  --bad:       #a13b2b;

  --accent:    #7e3a8e;

  --shadow-1: 0 1px 0 rgba(20,19,15,0.04), 0 0 0 1px rgba(20,19,15,0.05);
  --shadow-2: 0 1px 2px rgba(20,19,15,0.05), 0 0 0 1px rgba(20,19,15,0.06);

  --r-card: 4px;
  --r-pill: 999px;

  --gap: 16px;
  --pad: 22px;
}

[data-accent="Tinta"]    { --accent: #2f4e72; }
[data-accent="Cobre"]    { --accent: #a05a2c; }
[data-accent="Bosque"]   { --accent: #3d6a3a; }
[data-accent="Berenjena"]{ --accent: #7e3a8e; }

[data-density="compact"] {
  --gap: 12px;
  --pad: 16px;
}

/* Fonts */
@font-face { /* fallback chain — google fonts loaded below */
  font-family: "_disp_fallback";
  src: local("Georgia"), local("Times");
}

html, body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: "Geist", "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-feature-settings: "ss01", "cv11", "tnum";
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

:root[data-display-font="Editorial"] .display,
:root[data-display-font="Editorial"] .title-main,
:root[data-display-font="Editorial"] .kpi-value,
:root[data-display-font="Editorial"] h3,
:root[data-display-font="Editorial"] .big-num,
:root[data-display-font="Editorial"] .tienda-headline .big,
:root[data-display-font="Editorial"] .comm-big,
:root[data-display-font="Editorial"] .proj-val,
:root[data-display-font="Editorial"] .cmp-money {
  font-family: "Instrument Serif", "Cormorant Garamond", Georgia, serif;
  font-weight: 400;
  letter-spacing: -0.01em;
}

:root[data-display-font="Moderna"] .display,
:root[data-display-font="Moderna"] .title-main,
:root[data-display-font="Moderna"] .kpi-value,
:root[data-display-font="Moderna"] h3,
:root[data-display-font="Moderna"] .big-num,
:root[data-display-font="Moderna"] .tienda-headline .big,
:root[data-display-font="Moderna"] .comm-big,
:root[data-display-font="Moderna"] .proj-val,
:root[data-display-font="Moderna"] .cmp-money {
  font-family: "Geist", "Inter Tight", system-ui, sans-serif;
  font-weight: 500;
  letter-spacing: -0.02em;
}

.num, .row-bar, .ranking td.num, .matrix td.num, .ext-table td.num,
.kpi-value, .big-num, .stat-value, .cmp-money, .comm-big, .proj-val {
  font-variant-numeric: tabular-nums;
}

/* ===== app shell ===== */
.app {
  max-width: 1480px;
  margin: 0 auto;
  padding: 24px 28px 80px;
}

/* ===== top bar ===== */
.topbar {
  display: flex;

  flex-wrap: wrap;

  align-items: center;

  gap: 14px 24px;
  padding: 14px 20px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: var(--r-card);
  margin-bottom: 18px;
  position: relative; z-index: 60;
  backdrop-filter: blur(6px);
}
.topbar-left { display: flex; align-items: center; gap: 18px; min-width: 0; flex-wrap: wrap; flex: 1 1 340px; }
.topbar-right { display: flex; align-items: center; gap: 10px 12px; flex-wrap: wrap; justify-content: flex-end; flex: 1 1 auto; }

@media (max-width: 1200px) {
  .topbar { grid-template-columns: 1fr; }
  .topbar-right { justify-content: flex-start; }
}

.mark {
  width: 32px; height: 32px; border-radius: 999px;
  background: var(--ink); color: var(--bg-elev);
  display: grid; place-items: center;
}
.title-block .eyebrow {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}
.title-block .title-main {
  font-size: 22px;
  line-height: 1.05;
  color: var(--ink);
  margin-top: 1px;
  white-space: nowrap;
}
.divider { width: 1px; height: 30px; background: var(--hairline-strong); }

.view-tabs { display: flex; gap: 2px; padding: 3px; background: var(--bg-elev); border-radius: var(--r-pill); }
.vtab {
  border: 0; background: transparent;
  font: inherit; font-size: 13px; color: var(--ink-700);
  padding: 6px 14px; border-radius: var(--r-pill);
  cursor: pointer; transition: all .15s;
  font-weight: 500;
}
.vtab:hover { color: var(--ink); }
.vtab.is-active { background: var(--ink); color: #fbf8f2; }

.search {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  background: var(--bg-elev);
  border-radius: var(--r-pill);
  color: var(--muted);

  width: 200px; flex: 0 1 200px;

}
.search input {
  border: 0; background: transparent; font: inherit; font-size: 13px;
  color: var(--ink); outline: none; width: 100%;
}
.search input::placeholder { color: var(--muted); }

.chips { display: flex; gap: 4px; padding: 3px; background: var(--bg-elev); border-radius: var(--r-pill); }
.chip {
  border: 0; background: transparent;
  font: inherit; font-size: 12px; font-weight: 500;
  padding: 5px 12px; border-radius: var(--r-pill);
  cursor: pointer; color: var(--ink-700);
  letter-spacing: 0.01em;
}
.chip:hover { color: var(--ink); }
.chip.is-active { background: var(--surface); color: var(--ink); box-shadow: 0 0 0 1px var(--hairline-strong); }

.upload-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 6px 12px;
  background: var(--ink);
  color: #fbf8f2;
  border: 0;
  border-radius: var(--r-pill);
  font: inherit; font-size: 12px; font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.01em;
  transition: transform 0.1s, background 0.15s;
}
.upload-btn:hover { background: var(--ink-700); }
.upload-btn:active { transform: scale(0.97); }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px 12px 14px;
  background: var(--ink); color: #fbf8f2;
  border-radius: 8px;
  font-size: 13px; font-weight: 500;
  box-shadow: 0 10px 28px rgba(20,19,15,0.18), 0 0 0 1px rgba(20,19,15,0.4);
  z-index: 200;
  max-width: 540px;
  animation: toast-in 0.25s cubic-bezier(.2,.7,.3,1.2);
}
.toast-icon {
  display: inline-grid; place-items: center;
  width: 22px; height: 22px; border-radius: 999px;
  background: rgba(255,255,255,0.15);
  font-size: 12px; font-weight: 700;
}
.toast-success .toast-icon { background: var(--good); color: white; }
.toast-error { background: var(--bad); }
.toast-error .toast-icon { background: rgba(255,255,255,0.2); }
.toast-info .toast-icon { background: rgba(255,255,255,0.2); }
.toast-msg { flex: 1; }
.toast-close {
  border: 0; background: transparent;
  color: inherit; opacity: 0.6;
  font-size: 20px; line-height: 1; padding: 0 0 0 6px;
  cursor: pointer;
  font-family: inherit;
}
.toast-close:hover { opacity: 1; }
@keyframes toast-in {
  from { transform: translate(-50%, 20px); opacity: 0; }
  to { transform: translate(-50%, 0); opacity: 1; }
}

.period-wrap { position: relative; }
.period-pill {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 12px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: var(--r-pill);
  font-size: 12px; color: var(--ink-700); font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}
.period-pill:hover { border-color: var(--hairline-strong); color: var(--ink); }
.period-pill .dot { width: 6px; height: 6px; background: var(--good); border-radius: 999px; box-shadow: 0 0 0 3px rgba(79,122,63,0.18); }
.period-pill b { font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }

.period-popover {
  position: absolute; top: calc(100% + 8px); right: 0;
  width: 280px;
  background: var(--surface);
  border: 1px solid var(--hairline-strong);
  border-radius: 6px;
  padding: 14px;
  z-index: 100;
  box-shadow: 0 12px 32px rgba(20,19,15,0.12), 0 1px 0 rgba(20,19,15,0.04);
}
.pop-head {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); font-weight: 600;
  margin-bottom: 10px;
}
.pop-reset {
  border: 0; background: transparent;
  font: inherit; font-size: 10px;
  color: var(--accent); cursor: pointer;
  text-transform: none; letter-spacing: 0;
  text-decoration: underline;
  text-underline-offset: 2px;
  padding: 0;
}
.period-popover input[type="range"] {
  width: 100%;
  accent-color: var(--accent);
  margin: 4px 0 10px;
}
.pop-foot {
  display: flex; justify-content: space-between; font-size: 12px;
}
.pop-foot b { color: var(--ink); font-variant-numeric: tabular-nums; }
.pop-foot .muted { color: var(--muted); }
.pop-hint {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--hairline);
  font-size: 11px; color: var(--muted); line-height: 1.5;
}
.pop-hint b { color: var(--ink-700); font-weight: 600; }

.empty {
  padding: 32px 16px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  background: var(--surface-2);
  border-radius: 4px;
  border: 1px dashed var(--hairline-strong);
}

/* ===== KPI strip ===== */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: var(--gap);
  margin-bottom: 18px;
}
.kpi {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: var(--r-card);
  padding: 18px 18px 16px;
  position: relative;
  overflow: hidden;
}
.kpi::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--ink);
}
.kpi:nth-child(2)::before { background: var(--accent); }
.kpi:nth-child(3)::before { background: var(--good); }
.kpi:nth-child(4)::before { background: var(--warn); }
.kpi:nth-child(5)::before { background: var(--ink-700); }
.kpi:nth-child(6)::before { background: var(--bad); }

.kpi-eyebrow {
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); font-weight: 600;
}
.kpi-value {
  font-size: 30px;
  margin-top: 6px;
  color: var(--ink);
  line-height: 1.05;
}
.kpi-sub {
  font-size: 12px; color: var(--ink-500);
  margin-top: 6px; line-height: 1.4;
}
.kpi-sub b { color: var(--ink); font-weight: 600; }
.kpi-bar { margin-top: 10px; }
.kpi-tiendas { display: flex; flex-direction: column; gap: 7px; margin-top: 8px; }
.kpi-tienda-row { display: grid; grid-template-columns: 62px 1fr 46px; align-items: center; gap: 9px; font-size: 11px; }
.kpi-tienda-row .kt-name { display: flex; align-items: center; gap: 5px; color: var(--ink-700); font-weight: 600; white-space: nowrap; letter-spacing: 0.02em; }
.kpi-tienda-row .kt-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.kpi-tienda-row .kt-bar { height: 7px; background: var(--rail); border-radius: 999px; overflow: hidden; }
.kpi-tienda-row .kt-bar > span { display: block; height: 100%; border-radius: 999px; transition: width 0.6s cubic-bezier(.2,.7,.3,1); }
.kpi-tienda-row .kt-pct { text-align: right; font-variant-numeric: tabular-nums; font-weight: 700; color: var(--ink); }

.mini-bar {
  display: block; height: 4px; background: var(--rail); border-radius: 999px; overflow: hidden;
}
.mini-bar > span {
  display: block; height: 100%; background: var(--good);
  transition: width 0.6s cubic-bezier(.2,.7,.3,1);
}

/* ===== main grids ===== */
.main { display: block; }

.card {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: var(--r-card);
  padding: var(--pad);
  min-width: 0;
}
.card-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--hairline);
}
.card-head h3 {
  margin: 0; font-size: 20px; color: var(--ink); font-weight: 400; line-height: 1.1;
}
.card-sub { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
.card-foot {
  margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--hairline);
  font-size: 12px; color: var(--ink-500);
}
.card-foot b { color: var(--ink); }

.resumen-grid, .vend-grid, .tiendas-grid, .externos-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: var(--gap);
}
.span-5  { grid-column: span 5; }
.span-7  { grid-column: span 7; }
.span-12 { grid-column: 1 / -1; }

/* ===== Tienda rows ===== */
.tienda-rows { display: flex; flex-direction: column; gap: 18px; }
.tienda-row {
  display: grid;
  grid-template-columns: 130px 180px 1fr;
  align-items: center;
  gap: 18px;
}
.tienda-name { display: flex; align-items: center; gap: 10px; }
.tienda-name .t-name { font-size: 15px; font-weight: 500; letter-spacing: 0.02em; }
.swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.tienda-money { display: flex; flex-direction: column; gap: 2px; }
.tienda-money .big-num { font-size: 22px; line-height: 1; }
.tienda-money .mny-row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; font-size: 12px; font-variant-numeric: tabular-nums; line-height: 1.5; }
.tienda-money .mny-row .lbl { color: var(--muted); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.tienda-money .mny-row .amt { color: var(--ink-700); font-weight: 600; }
.tienda-bar { display: flex; flex-direction: column; gap: 6px; }
.tienda-pcts { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.tienda-pcts .pct { font-weight: 600; color: var(--ink); }
.tienda-pcts .pct.good { color: var(--good); }
.tienda-pcts .pct.warn { color: var(--warn); }
.tienda-pcts .pct.bad { color: var(--bad); }
.tienda-pcts .dot-sep { color: var(--muted); }
.tienda-pcts .muted { color: var(--muted); }

/* ===== Donut block ===== */
.donut-block { display: grid; grid-template-columns: 220px 1fr; gap: 18px; align-items: center; }
.legend { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; font-size: 12px; }
.legend li {
  display: grid; grid-template-columns: 14px 1fr auto auto; gap: 8px; align-items: center;
  padding: 4px 6px; border-radius: 3px; cursor: default; transition: opacity 0.15s, background 0.15s;
}
.legend li:hover { background: var(--bg-elev); }
.legend li.dim { opacity: 0.35; }
.legend .dot { width: 8px; height: 8px; border-radius: 999px; }
.legend .name { color: var(--ink); font-weight: 500; }
.legend .val { color: var(--ink-500); font-variant-numeric: tabular-nums; }
.legend .pct-side { color: var(--muted); font-variant-numeric: tabular-nums; min-width: 38px; text-align: right; }
.legend.tight li { padding: 3px 4px; }

/* ===== Ranking table ===== */
table.ranking, table.matrix, table.ext-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
table.ranking th, table.matrix th, table.ext-table th {
  text-align: left; font-weight: 500; color: var(--muted);
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 8px 8px; border-bottom: 1px solid var(--hairline);
  white-space: nowrap;
}
table.ranking td, table.matrix td, table.ext-table td {
  padding: 11px 8px; border-bottom: 1px solid var(--hairline);
  vertical-align: middle;
}
table.ranking tr:last-child td, table.matrix tr:last-child td, table.ext-table tr:last-child td { border-bottom: 0; }
.num { text-align: right; font-variant-numeric: tabular-nums; }
th.num { text-align: right; }
table.ranking th.num, table.matrix th.num, table.ext-table th.num { text-align: right; }
.num.good { color: var(--good); }
.num.bad { color: var(--bad); }
.rank { color: var(--muted); font-weight: 500; font-size: 11px; }
.vend-cell { font-weight: 500; white-space: nowrap; }
.vend-cell > * { vertical-align: middle; }
.vend-cell > * + * { margin-left: 8px; }
.vend-cell .swatch { display: inline-block; }
.vend-cell .tag {
  font-size: 10px; padding: 2px 6px; background: var(--bg-elev);
  border-radius: 3px; color: var(--ink-700); letter-spacing: 0.06em;
  text-transform: uppercase;
}
.vend-cell .record {
  font-size: 10px; padding: 2px 6px; background: #fdf3da; color: #8a6610;
  border-radius: 3px; font-weight: 600; letter-spacing: 0.04em;
}
.num-with-bar { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; width: 100%; }
.num-cell { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; }
.row-bar { width: 80px; height: 3px; background: var(--rail); border-radius: 999px; overflow: hidden; }
.row-bar.tiny { width: 60px; height: 2px; }
.row-bar > div { height: 100%; transition: width 0.6s cubic-bezier(.2,.7,.3,1); }

th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { color: var(--ink); }
.sort-arrow { margin-left: 2px; color: var(--ink); }

/* ===== Proyección list ===== */
.proy-list { display: flex; flex-direction: column; gap: 8px; }
.proy-row {
  display: grid;
  grid-template-columns: 80px 1fr 18px 1fr 96px;
  align-items: center; gap: 8px;
  padding: 10px 4px;
  border-bottom: 1px solid var(--hairline);
  font-size: 13px;
}
.proy-row:last-child { border-bottom: 0; }
.proy-row.total { border-top: 2px solid var(--ink); padding-top: 12px; font-weight: 600; }
.proy-name { font-weight: 500; }
.proy-actual { color: var(--ink-500); font-variant-numeric: tabular-nums; }
.proy-arrow { color: var(--muted); text-align: center; }
.proy-value { color: var(--ink); font-variant-numeric: tabular-nums; font-weight: 600; }
.proy-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; line-height: 1.2; text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }

.proy-meta small { font-size: 9px; color: var(--muted); font-weight: 600; letter-spacing: .03em; }

.proy-pres { font-size: 11px; color: var(--ink-500); font-weight: 600; }
.proy-meta .good { color: var(--good); }
.proy-meta .bad { color: var(--bad); }

/* ===== Commission grid ===== */
.commission-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap); }
.comm-card {
  padding: 18px;
  background: var(--surface-2);
  border-radius: var(--r-card);
  border: 1px solid var(--hairline);
}
.comm-head { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; }
.comm-big { font-size: 28px; margin-top: 8px; line-height: 1.1; }
.comm-detail { display: flex; flex-direction: column; gap: 4px; margin-top: 12px; font-size: 12px; }
.comm-detail > div { display: flex; justify-content: space-between; font-variant-numeric: tabular-nums; }
.comm-detail .muted { color: var(--muted); }
.comm-card.per-vend ul { list-style: none; padding: 0; margin: 10px 0 0; display: flex; flex-direction: column; gap: 4px; }
.comm-card.per-vend li { display: grid; grid-template-columns: 14px 1fr auto auto; gap: 8px; align-items: center; font-size: 12px; }
.comm-card.per-vend li .name { font-weight: 500; }
.comm-card.per-vend li .val { font-variant-numeric: tabular-nums; }
.comm-card.per-vend li .pct-side { color: var(--muted); font-variant-numeric: tabular-nums; min-width: 38px; text-align: right; }

/* ===== Comparator ===== */
.cmp-tokens { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
.token {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  border: 1px solid var(--hairline-strong);
  background: var(--surface);
  border-radius: var(--r-pill);
  font: inherit; font-size: 12px; font-weight: 500; color: var(--ink-700);
  cursor: pointer;
  transition: all 0.15s;
}
.token:hover { color: var(--ink); border-color: var(--ink); }
.token.is-on { color: var(--ink); font-weight: 600; }
.token .t-tag {
  font-size: 9px; padding: 1px 5px; background: var(--bg-elev);
  border-radius: 2px; color: var(--muted); font-weight: 600;
}

.cmp-body { display: grid; grid-template-columns: 420px 1fr; gap: 24px; align-items: start; }
.cmp-radar { display: flex; flex-direction: column; gap: 14px; }
.radar-key { font-size: 11px; }
.radar-key .key-title { color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 6px; }
.radar-key ul { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 14px; }
.radar-key li { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid var(--hairline); }
.radar-key li i { color: var(--muted); font-style: normal; font-variant-numeric: tabular-nums; }

.cmp-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; align-content: start; }
.cmp-card {
  background: var(--surface-2);
  border: 1px solid var(--hairline);
  border-top: 3px solid var(--ink);
  border-radius: 3px;
  padding: 14px;
}
.cmp-card-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
.cmp-name { font-weight: 600; font-size: 13px; }
.cmp-tag { font-size: 10px; padding: 2px 5px; background: var(--surface); border-radius: 2px; color: var(--ink-700); }
.cmp-money { font-size: 24px; line-height: 1; margin-top: 4px; }
.cmp-delta { font-size: 11px; margin-top: 4px; font-variant-numeric: tabular-nums; font-weight: 600; }
.cmp-delta.good { color: var(--good); }
.cmp-delta.bad { color: var(--bad); }
.cmp-stats { margin: 12px 0 0; padding: 0; display: grid; grid-template-columns: 1fr; gap: 4px; }
.cmp-stats > div { display: flex; justify-content: space-between; font-size: 11px; padding: 3px 0; border-bottom: 1px solid var(--hairline); }
.cmp-stats > div:last-child { border-bottom: 0; }
.cmp-stats dt { color: var(--muted); margin: 0; }
.cmp-stats dd { margin: 0; font-variant-numeric: tabular-nums; font-weight: 500; }

/* ===== Matrix table ===== */
.matrix-wrap { overflow-x: auto; margin: 0 -8px; }
table.matrix { font-size: 12px; }
table.matrix tr.is-sel td { background: var(--bg-elev); }
table.matrix tr.is-sel td:first-child { box-shadow: inset 3px 0 0 var(--ink); }

/* ===== Tienda cards ===== */
.tiendas-grid { grid-template-columns: 1fr 1fr; }
.tienda-card { display: flex; flex-direction: column; gap: 18px; }
.tienda-head {
  display: grid; grid-template-columns: 1fr auto; align-items: end;
  border-top: 3px solid var(--ink);
  padding-top: 14px;
  margin-bottom: 4px;
}
.tienda-head .eyebrow {
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); font-weight: 600;
}
.tienda-head h3 { font-size: 28px; margin-top: 2px; }
.tienda-headline { text-align: right; }
.tienda-headline .big { font-size: 32px; line-height: 1; }
.tienda-headline .pace { font-size: 12px; margin-top: 4px; font-weight: 600; }
.tienda-headline .pace.good { color: var(--good); }
.tienda-headline .pace.warn { color: var(--warn); }
.tienda-headline .pace.bad { color: var(--bad); }
.tienda-headline .muted { color: var(--muted); font-weight: 400; }

.tienda-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.stat {
  background: var(--surface-2); border: 1px solid var(--hairline);
  border-radius: 3px; padding: 10px 12px;
}
.stat-label { font-size: 10px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; font-weight: 600; }
.stat-value { font-size: 16px; font-weight: 600; margin-top: 4px; font-variant-numeric: tabular-nums; }

.tienda-progress { display: flex; flex-direction: column; gap: 8px; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--ink-700); font-weight: 500; }
.progress-label .muted { color: var(--muted); }

.tienda-vends { display: flex; flex-direction: column; gap: 6px; }
.t-vend-row {
  display: grid; grid-template-columns: 14px 1fr auto 50px 58px 96px; gap: 10px;
  align-items: center; font-size: 13px;
  padding: 4px 0;
}
.t-vend-row .name { font-weight: 500; }
.t-vend-row .val { font-variant-numeric: tabular-nums; }
.t-vend-row .pct { font-variant-numeric: tabular-nums; color: var(--ink-700); text-align: right; }
.t-vend-row .mom { font-variant-numeric: tabular-nums; text-align: right; font-size: 11.5px; font-weight: 600; }
.t-vend-row .mom.good { color: var(--good); }
.t-vend-row .mom.bad { color: var(--bad); }
.t-vend-row.t-vend-head { padding: 0 0 4px; border-bottom: 1px solid var(--hairline); margin-bottom: 2px; }
.t-vend-row.t-vend-head span { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--muted); font-weight: 600; }
.t-vend-row.t-vend-head .pct, .t-vend-row.t-vend-head .mom { text-align: right; }
.t-vend-row .bar { height: 5px; background: var(--rail); border-radius: 999px; overflow: hidden; }
.t-vend-row .bar > div { height: 100%; transition: width 0.6s cubic-bezier(.2,.7,.3,1); }

.tienda-proj {
  background: var(--surface-2); border: 1px solid var(--hairline);
  border-radius: 3px; padding: 14px;
}
.proj-row {
  display: flex; align-items: center; gap: 16px; margin-top: 10px; flex-wrap: wrap;
}
.proj-row .arrow { color: var(--muted); }
.proj-row .muted { font-size: 10px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; font-weight: 600; }
.proj-row .proj-val { font-size: 20px; margin-top: 2px; font-variant-numeric: tabular-nums; }
.proj-row .verdict { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 3px; margin-left: auto; }
.proj-row .verdict.good { background: rgba(79,122,63,0.13); color: var(--good); }
.proj-row .verdict.bad { background: rgba(161,59,43,0.13); color: var(--bad); }

/* ===== Externos ===== */
.ext-table { font-size: 13px; }
.ext-table th.num { text-align: right; }
.ext-bar { width: 100%; height: 6px; background: var(--rail); border-radius: 999px; overflow: hidden; }
.ext-bar > div { height: 100%; background: var(--accent); }
.ext-donut { display: flex; flex-direction: column; align-items: center; gap: 14px; }
.ext-donut .legend { width: 100%; max-width: 260px; }

/* ===== Footer ===== */
.appfoot {
  margin-top: 28px;
  display: flex; gap: 10px; align-items: center;
  font-size: 11px; color: var(--ink-500);
  padding: 12px 6px;
  border-top: 1px solid var(--hairline);
}
.appfoot .muted { color: var(--muted); }
.appfoot b { color: var(--ink); font-weight: 600; }

/* ===== density compact ===== */
[data-density="compact"] .kpi { padding: 14px 14px 12px; }
[data-density="compact"] .kpi-value { font-size: 24px; }
[data-density="compact"] .card-head { margin-bottom: 12px; padding-bottom: 8px; }
[data-density="compact"] .card-head h3 { font-size: 16px; }
[data-density="compact"] table.ranking td, [data-density="compact"] table.matrix td, [data-density="compact"] table.ext-table td { padding: 7px 6px; }
[data-density="compact"] .tienda-headline .big { font-size: 26px; }

/* small screens */
@media (max-width: 1200px) {
  .kpi-strip { grid-template-columns: repeat(3, 1fr); }
  .commission-grid { grid-template-columns: 1fr 1fr; }
  .cmp-body { grid-template-columns: 1fr; }
  .tiendas-grid { grid-template-columns: 1fr; }
  .span-5, .span-7 { grid-column: 1 / -1; }
}

window.parseXlsxFile = async function(file) {

  /* ════════════ MODALES ════════════ */
  var overlay = null;
  function closeModal() { if (overlay) { overlay.classList.remove("show"); var o = overlay; setTimeout(function () { if (o && o.parentNode) o.parentNode.removeChild(o); }, 220); overlay = null; } }
  function openModal(buildBody, opts) {
    closeModal();
    opts = opts || {};
    overlay = el("div", "mx-overlay");
    var panel = el("div", "mx-panel" + (opts.wide ? " wide" : ""));
    var head = el("div", "mx-phead");
    var hl = el("div");
    var h2 = el("h2", null, opts.title || "");
    hl.appendChild(h2);
    if (opts.sub) { var s = el("div", "mx-sub", opts.sub); hl.appendChild(s); }
    var close = el("button", "mx-close", "✕");
    close.addEventListener("click", closeModal);
    head.appendChild(hl); head.appendChild(close);
    var body = el("div", "mx-pbody");
    buildBody(body);
    panel.appendChild(head); panel.appendChild(body);
    overlay.appendChild(panel);
    overlay.addEventListener("click", function (e) { if (e.target === overlay) closeModal(); });
    document.body.appendChild(overlay);
    requestAnimationFrame(function () { overlay.classList.add("show"); });
  }
  document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeModal(); });

  /* ---------- 2 + 5. FICHA VENDEDOR (con comparación mes anterior) ---------- */
  function statBox(label, value, extra) {
    var b = el("div", "mx-stat");
    b.appendChild(el("div", "l", label));
    b.appendChild(el("div", "v", value));
    if (extra) b.appendChild(el("div", "x", extra));
    return b;
  }
  function progRow(label, pct, color, valTxt) {
    var w = el("div", "mx-progrow");
    var t = el("div", "t");
    var ls = el("span", null, label);
    var rs = el("b", null, valTxt != null ? valTxt : fmtPct(pct));
    t.appendChild(ls); t.appendChild(rs);
    var p = el("div", "mx-prog");
    var i = el("i"); i.style.width = Math.min(Math.max(pct, 0), 1.5) / 1.5 * 100 + "%"; i.style.background = color;
    p.appendChild(i);
    w.appendChild(t); w.appendChild(p);
    return w;
  }
  function openFicha(name) {
    var v = vendByName(name); if (!v) return;
    var tiendaLbl = v.tienda === "SUEÑA" ? "Sueña" : v.tienda === "HEAVEN" ? "Heaven" : v.tienda;
    openModal(function (body) {
      // tags
      var tagRow = el("div");
      tagRow.appendChild(el("span", "mx-tag", tiendaLbl));
      if (v.nuevoRecord) tagRow.appendChild(el("span", "mx-tag rec", "🏆 Récord"));
      body.appendChild(tagRow);
      // monto grande
      var big = el("div", "mx-bigrow");
      big.appendChild(el("span", "mx-big", fmtBs(v.monto)));
      var ant = montoAnteriorVend(v);
      if (v.esNuevo) {
        var dn = el("span", "mx-delta up");
        dn.textContent = "★ Nuevo este mes";
        big.appendChild(dn);
      } else if (v.crecimientoVsMesAnt != null) {
        var d = el("span", "mx-delta " + (v.crecimientoVsMesAnt >= 0 ? "up" : "down"));
        d.textContent = (v.crecimientoVsMesAnt >= 0 ? "▲ " : "▼ ") + fmtPctSign(v.crecimientoVsMesAnt);
        big.appendChild(d);
      }
      body.appendChild(big);
      body.appendChild(el("div", "mx-sub", "Venta acumulada del mes"));

      // stats principales
      var g = el("div", "mx-statgrid");
      g.appendChild(statBox("Ticket promedio", fmtBs(v.ticketProm)));
      g.appendChild(statBox("Conversión", fmtPct(v.conversion, 2), fmtBs(v.ingresoLead) + " / lead"));
      g.appendChild(statBox("Leads", (v.leads || 0).toLocaleString("es-BO")));
      g.appendChild(statBox("Ventas", (v.ventasConcretadas || 0) + (v.productos ? " · " + v.productos + " prod." : "")));
      body.appendChild(g);

      // cumplimiento
      body.appendChild(el("div", "mx-sech", "Cumplimiento"));
      body.appendChild(progRow("Meta mínima · " + fmtBs(v.metaMin), v.pctMin, v.pctMin >= 1 ? "var(--good)" : v.pctMin >= .8 ? "var(--warn)" : "var(--bad)", fmtPct(v.pctMin)));
      body.appendChild(progRow("Presupuesto · " + fmtBs(v.presupuesto), v.pctPres, v.pctPres >= 1 ? "var(--good)" : v.pctPres >= .8 ? "var(--warn)" : "var(--bad)", fmtPct(v.pctPres)));

      // comparación mes anterior
      if (ant != null) {
        body.appendChild(el("div", "mx-sech", "vs Mes anterior"));
        var cmp = el("div", "mx-cmp");
        var s1 = el("div", "seg"); s1.appendChild(el("div", "l", "Mes anterior")); s1.appendChild(el("div", "v", fmtBs(ant)));
        var arr = el("div", "arr", "→");
        var s2 = el("div", "seg"); s2.appendChild(el("div", "l", "Este mes")); s2.appendChild(el("div", "v", fmtBs(v.monto)));
        var s3 = el("div", "seg");
        s3.appendChild(el("div", "l", "Variación"));
        var vv = el("div", "v"); vv.style.color = v.crecimientoVsMesAnt >= 0 ? "var(--good)" : "var(--bad)";
        vv.textContent = fmtPctSign(v.crecimientoVsMesAnt);
        s3.appendChild(vv);
        cmp.appendChild(s1); cmp.appendChild(arr); cmp.appendChild(s2); cmp.appendChild(s3);
        body.appendChild(cmp);
      }

      // comisiones
      if ((v.comision || 0) + (v.bonoTitanio || 0) > 0) {
        body.appendChild(el("div", "mx-sech", "Comisiones"));
        var g2 = el("div", "mx-statgrid");
        g2.appendChild(statBox("Comisión", fmtBs(v.comision), fmtPct(v.pctComision || 0) + " del monto"));
        g2.appendChild(statBox("Bono Titanio", fmtBs(v.bonoTitanio)));
        body.appendChild(g2);
      }

      // proyección
      var dia = periodoDia(), dt = (D.periodo || {}).diasTotales || 30;
      var proy = dia > 0 ? (v.monto / dia) * dt : v.monto;
      body.appendChild(el("div", "mx-sech", "Proyección a cierre"));
      var g3 = el("div", "mx-statgrid");
      g3.appendChild(statBox("Proyección", fmtBs(proy), "ritmo " + fmtBs(v.monto / Math.max(dia, 1)) + "/día"));
      g3.appendChild(statBox("vs Presupuesto", v.presupuesto ? fmtPct(proy / v.presupuesto) : "—"));
      body.appendChild(g3);
    }, { title: name, sub: tiendaLbl + " · ficha de vendedor", wide: false });
  }

  /* ---------- 1. TAB ALERTAS ---------- */
  function buildAlertas() {
    var out = [];
    var vends = D.vendedores || [], tiendas = D.tiendas || [];
    var ventaGlobal = tiendas.reduce(function (s, t) { return s + (t.monto || 0); }, 0);
    var presupGlobal = tiendas.reduce(function (s, t) { return s + (t.presupuesto || 0); }, 0);

    if (ventaGlobal === 0) {
      return [{ kind: "yellow", ico: "🕓", html: "<b>Sin datos cargados.</b> Aún no hay ventas registradas para este mes. Sube el Excel del mes con el botón “Subir Excel” para activar las alertas." }];
    }

    var dia = periodoDia(), dt = (D.periodo || {}).diasTotales || 30, rest = Math.max(dt - dia, 0);
    // Todas las alertas se evalúan por PROYECCIÓN a cierre (ritmo de los primeros `dia` días) vs PRESUPUESTO,
    // igual que la proyección global → así un vendedor que va en buen ritmo no aparece como crítico a mitad de mes.
    var proyOf = function (monto) { return dia > 0 ? (monto / dia) * dt : monto; };
    var paceTxt = rest > 0 ? " (al ritmo de los primeros " + dia + " de " + dt + " días)" : "";

    // GLOBAL
    var proyGlobal = proyOf(ventaGlobal);
    if (presupGlobal > 0 && proyGlobal < 0.8 * presupGlobal) {
      out.push({ kind: "red", ico: "🔴", html: "<b>Proyección global insuficiente:</b> a ritmo actual el mes cerraría en " + fmtBs(proyGlobal) + " (" + fmtPct(proyGlobal / presupGlobal) + " del presupuesto " + fmtBs(presupGlobal) + ")." });
    } else if (presupGlobal > 0 && proyGlobal < presupGlobal) {
      out.push({ kind: "yellow", ico: "🟡", html: "<b>Proyección global ajustada:</b> proyecta " + fmtBs(proyGlobal) + " (" + fmtPct(proyGlobal / presupGlobal) + " del presupuesto). Falta ritmo para el 100%." });
    }

    // TIENDAS por proyección vs presupuesto
    tiendas.forEach(function (t) {
      if (!(t.presupuesto > 0)) return;
      var proy = proyOf(t.monto), pace = proy / t.presupuesto;
      if (pace < 0.8) {
        out.push({ kind: "red", ico: "🔴", html: "<b>" + t.nombre + " proyecta no llegar al presupuesto:</b> cerraría en " + fmtBs(proy) + " (" + fmtPct(pace) + " de " + fmtBs(t.presupuesto) + ")" + paceTxt + "." });
      } else if (pace < 1) {
        out.push({ kind: "yellow", ico: "🟡", html: "<b>" + t.nombre + " ajustada al presupuesto:</b> proyecta " + fmtPct(pace) + " (" + fmtBs(proy) + " de " + fmtBs(t.presupuesto) + ")." });
      }
    });

    // VENDEDORES por proyección vs presupuesto (peor ritmo primero)
    vends.slice().filter(function (v) { return v.presupuesto > 0; }).sort(function (a, b) {
      return (proyOf(a.monto) / a.presupuesto) - (proyOf(b.monto) / b.presupuesto);
    }).forEach(function (v) {
      var proy = proyOf(v.monto), pace = proy / v.presupuesto;
      var falta = Math.max(0, v.presupuesto - v.monto);
      if (pace < 0.8) {
        out.push({ kind: "red", ico: "🔴", html: "<b>" + v.nombre + " — proyecta no alcanzar presupuesto:</b> cerraría en " + fmtBs(proy) + " (" + fmtPct(pace) + " de " + fmtBs(v.presupuesto) + ")" + (rest > 0 ? ". Necesita " + fmtBs(falta / rest) + "/día los " + rest + " día" + (rest === 1 ? "" : "s") + " restantes" : "") + "." });
      } else if (pace < 1) {
        out.push({ kind: "yellow", ico: "🟡", html: "<b>" + v.nombre + " cerca del presupuesto:</b> proyecta " + fmtPct(pace) + " (" + fmtBs(proy) + " de " + fmtBs(v.presupuesto) + ")." });
      }
    });

    // positivos
    vends.forEach(function (v) {
      if (v.nuevoRecord) out.push({ kind: "green", ico: "🏆", html: "<b>" + v.nombre + " — nuevo récord histórico personal:</b> " + fmtBs(v.monto) + ". ¡Reconocimiento al equipo!" });
    });
    var top = vends.slice().filter(function (v) { return v.crecimientoVsMesAnt != null; }).sort(function (a, b) { return b.crecimientoVsMesAnt - a.crecimientoVsMesAnt; })[0];
    if (top && top.crecimientoVsMesAnt > 0) out.push({ kind: "green", ico: "⭐", html: "<b>" + top.nombre + " — mayor crecimiento del mes:</b> " + fmtPctSign(top.crecimientoVsMesAnt) + " vs mes anterior." });
    var bestConv = vends.slice().filter(function (v) { return v.conversion != null; }).sort(function (a, b) { return b.conversion - a.conversion; })[0];
    if (bestConv) out.push({ kind: "green", ico: "🎯", html: "<b>" + bestConv.nombre + " — mejor conversión del equipo:</b> " + fmtPct(bestConv.conversion, 2) + " · " + fmtBs(bestConv.ingresoLead) + " por lead." });
    tiendas.forEach(function (t) {
      if (!(t.presupuesto > 0)) return;
      var proy = proyOf(t.monto), pace = proy / t.presupuesto;
      if (pace >= 1) out.push({ kind: "green", ico: "📈", html: "<b>" + t.nombre + " proyecta superar el presupuesto:</b> " + fmtPct(pace) + " (" + fmtBs(proy) + " de " + fmtBs(t.presupuesto) + ")." });
    });
    return out;
  }
  function countAlertasRed() { return buildAlertas().filter(function (a) { return a.kind === "red"; }).length; }
  function openAlertas() {
    openModal(function (body) {
      var alerts = buildAlertas();
      var order = { red: 0, yellow: 1, green: 2 };
      alerts.sort(function (a, b) { return order[a.kind] - order[b.kind]; });
      if (!alerts.length) { body.appendChild(el("div", "mx-empty", "Sin alertas. Todo en orden ✓")); return; }
      var lastKind = null, labels = { red: "Críticas", yellow: "Seguimiento", green: "Destacados positivos" };
      alerts.forEach(function (a) {
        if (a.kind !== lastKind) { body.appendChild(el("div", "mx-sech", labels[a.kind])); lastKind = a.kind; }
        var box = el("div", "mx-alert " + a.kind);
        box.appendChild(el("span", "ico", a.ico));
        var d = el("div"); d.innerHTML = a.html; box.appendChild(d);
        body.appendChild(box);
      });
    }, { title: "⚠ Alertas del mes", sub: (D.periodo || {}).mes + " " + (D.periodo || {}).anio, wide: true });
  }

  /* ════════════ INYECCIONES POST-RENDER ════════════ */

  /* botones del topbar: Historial, Alertas, Modo oscuro */
  function svgIco(d, vb) { var ns = "http://www.w3.org/2000/svg"; var s = document.createElementNS(ns, "svg"); s.setAttribute("width", "13"); s.setAttribute("height", "13"); s.setAttribute("viewBox", vb || "0 0 14 14"); s.setAttribute("fill", "none"); var p = document.createElementNS(ns, "path"); p.setAttribute("d", d); p.setAttribute("stroke", "currentColor"); p.setAttribute("stroke-width", "1.3"); p.setAttribute("stroke-linecap", "round"); p.setAttribute("stroke-linejoin", "round"); s.appendChild(p); return s; }

  var MESES = [
    { mes: "Mayo", anio: 2026, href: "dashboard-mayo-2026.html", estado: "cerrado" },
    { mes: "Junio", anio: 2026, href: "dashboard-junio-2026.html", estado: "activo" }
  ];
  var currentFile = location.pathname.split("/").pop() || "index.html";

  function buildHistorial() {
    var wrap = el("div", "hist-wrap");
    var btn = el("button", "mx-pill");
    btn.title = "Ver historial de meses";
    var ns = "http://www.w3.org/2000/svg", svg = document.createElementNS(ns, "svg");
    svg.setAttribute("width", "13"); svg.setAttribute("height", "13"); svg.setAttribute("viewBox", "0 0 14 14"); svg.setAttribute("fill", "none");
    var c = document.createElementNS(ns, "circle"); c.setAttribute("cx", "7"); c.setAttribute("cy", "7"); c.setAttribute("r", "5.5"); c.setAttribute("stroke", "currentColor"); c.setAttribute("stroke-width", "1.3");
    var p = document.createElementNS(ns, "path"); p.setAttribute("d", "M7 4.5V7.3L9.2 9.2"); p.setAttribute("stroke", "currentColor"); p.setAttribute("stroke-width", "1.3"); p.setAttribute("stroke-linecap", "round"); p.setAttribute("stroke-linejoin", "round");
    svg.appendChild(c); svg.appendChild(p);
    btn.appendChild(svg); btn.appendChild(document.createTextNode(" Historial"));
    var drop = el("div", "hist-drop");
    drop.appendChild(el("div", "hist-drop-head", "Meses disponibles"));
    MESES.slice().reverse().forEach(function (m) {
      var a = document.createElement("a"); a.href = m.href; a.className = "hist-row";
      if (currentFile === m.href || location.pathname.endsWith("/" + m.href)) a.classList.add("is-current");
      var left = el("div", "hist-left"); left.appendChild(el("span", null, m.mes)); left.appendChild(el("span", "hist-year", String(m.anio)));
      var badge = el("span", "hist-badge " + m.estado, m.estado === "cerrado" ? "✓ Cerrado" : "● En curso");
      a.appendChild(left); a.appendChild(badge); drop.appendChild(a);
    });
    btn.addEventListener("click", function (e) { e.stopPropagation(); wrap.classList.toggle("is-open"); });
    document.addEventListener("click", function (e) { if (!wrap.contains(e.target)) wrap.classList.remove("is-open"); });
    wrap.appendChild(btn); wrap.appendChild(drop);
    return wrap;
  }
  function buildAlertasBtn() {
    var btn = el("button", "mx-pill alert mx-alertas-btn");
    btn.title = "Ver alertas del mes";
    btn.appendChild(document.createTextNode("⚠ Alertas "));
    var n = countAlertasRed();
    if (n > 0) { var b = el("span", "mx-badge", String(n)); btn.appendChild(b); }
    btn.addEventListener("click", function (e) { e.stopPropagation(); openAlertas(); });
    return btn;
  }
  function buildThemeBtn() {
    var btn = el("button", "mx-pill mx-theme-btn");
    btn.title = "Cambiar tema claro / oscuro";
    var dark = document.documentElement.getAttribute("data-mx-theme") === "dark";
    var ico = el("span", "mx-theme-ico", dark ? "☀" : "🌙");
    var lbl = el("span", "mx-theme-label", dark ? "Claro" : "Oscuro");
    btn.appendChild(ico); btn.appendChild(lbl);
    btn.addEventListener("click", function (e) { e.stopPropagation(); toggleTheme(); });
    return btn;
  }

  function injectTopbar() {
    var uploadBtn = document.querySelector(".upload-btn");
    if (!uploadBtn || !uploadBtn.parentNode) return;
    var parent = uploadBtn.parentNode;
    if (!document.querySelector(".mx-theme-btn")) parent.insertBefore(buildThemeBtn(), uploadBtn);
    if (!document.querySelector(".mx-alertas-btn")) parent.insertBefore(buildAlertasBtn(), uploadBtn);
    if (!document.querySelector(".hist-wrap")) parent.insertBefore(buildHistorial(), uploadBtn);
    updateThemeBtn();
  }

  /* 6 + 12. KPIs: indicador ↑↓ y barra falta-meta + 9. tooltips */
  var KPI_TIPS = {
    "Venta total": "Suma de ventas reales acumuladas en el período (todas las tiendas o el filtro activo).",
    "Proyección cierre": "Estimación al cierre del mes = (venta acumulada ÷ días transcurridos) × días totales.",
    "Conversión": "Ventas cerradas ÷ leads recibidos × 100.",
    "Ticket promedio": "Ingreso total ÷ número de productos/transacciones.",
    "Comisiones": "Comisiones de vendedores + bonos Titanio del período.",
    "Presupuesto": "Venta acumulada vs el presupuesto del mes (la barra muestra el avance)."
  };
  function scopeMontos(scopeLabel) {
    var map = { "Global": null, "Sueña": "sueña", "Heaven": "heaven", "Externos": "otros", "Roho": "roho" };
    var id = map[scopeLabel];
    var tiendas = D.tiendas || [];
    if (id === null) {
      return {
        actual: tiendas.reduce(function (s, t) { return s + (t.monto || 0); }, 0),
        prev: tiendas.reduce(function (s, t) { return s + (t.mesPasadoMonto || 0); }, 0)
      };
    }
    var t = tiendaById(id);
    return t ? { actual: t.monto || 0, prev: t.mesPasadoMonto || 0 } : null;
  }
  function enhanceKPIs() {
    var kpis = document.querySelectorAll(".kpi-strip .kpi");
    kpis.forEach(function (kpi) {
      var eyebrow = (kpi.querySelector(".kpi-eyebrow") || {}).textContent || "";
      // tooltip
      var tipKey = Object.keys(KPI_TIPS).find(function (k) { return eyebrow.indexOf(k) === 0; });
      if (tipKey && !kpi.hasAttribute("title")) { kpi.setAttribute("title", KPI_TIPS[tipKey]); kpi.setAttribute("data-mx-tip", "1"); }

      // indicador ↑↓ en Venta total
      if (eyebrow.indexOf("Venta total") === 0 && !kpi.querySelector(".mx-delta")) {
        var scope = eyebrow.split("·")[1] ? eyebrow.split("·")[1].trim() : "Global";
        var m = scopeMontos(scope);
        if (m && m.prev > 0 && m.actual > 0) {
          var chg = (m.actual - m.prev) / m.prev;
          var valEl = kpi.querySelector(".kpi-value");
          if (valEl) {
            var d = el("span", "mx-delta " + (Math.abs(chg) < 0.001 ? "flat" : chg > 0 ? "up" : "down"));
            d.textContent = (chg > 0 ? "▲ " : chg < 0 ? "▼ " : "") + fmtPctSign(chg) + " vs mes ant.";
            valEl.appendChild(d);
          }
        }
      }

      // barra de progreso en Presupuesto
      if (eyebrow.indexOf("Presupuesto") === 0 && !kpi.querySelector(".mx-faltabar")) {
        var scope2 = "Global";
        // intentar inferir scope desde el KPI de venta total
        var vt = document.querySelector(".kpi-strip .kpi .kpi-eyebrow");
        var allEy = document.querySelectorAll(".kpi-strip .kpi-eyebrow");
        allEy.forEach(function (e2) { if (e2.textContent.indexOf("Venta total") === 0) { var p2 = e2.textContent.split("·")[1]; if (p2) scope2 = p2.trim(); } });
        var mm = scopeMontos(scope2);
        var tiendas = D.tiendas || [];
        var metaScope;
        if (scope2 === "Global") metaScope = tiendas.reduce(function (s, t) { return s + (t.presupuesto || 0); }, 0);
        else { var idmap = { "Sueña": "sueña", "Heaven": "heaven", "Externos": "otros", "Roho": "roho" }; var tt = tiendaById(idmap[scope2]); metaScope = tt ? tt.presupuesto : 0; }
        if (mm && metaScope > 0) {
          var pct = Math.min(mm.actual / metaScope, 1);
          var bar = el("div", "mx-faltabar"); var ii = el("i"); ii.style.width = pct * 100 + "%";
          ii.style.background = pct >= 1 ? "var(--good)" : pct >= 0.8 ? "var(--warn)" : "var(--bad)";
          bar.appendChild(ii); kpi.appendChild(bar);
        }
      }
    });
  }

  /* 11 + 2. Ranking: semáforos + click → ficha */
  function enhanceRanking() {
    var rows = document.querySelectorAll(".ranking tbody tr");
    rows.forEach(function (tr) {
      var cell = tr.querySelector(".vend-cell");
      if (!cell) return;
      var spans = cell.querySelectorAll("span");
      // el nombre es el primer span de texto sin clase swatch/tag/record
      var name = null;
      spans.forEach(function (sp) { if (!sp.classList.contains("swatch") && !sp.classList.contains("tag") && !sp.classList.contains("record") && !name) name = sp.textContent.trim(); });
      if (!name) return;
      var v = vendByName(name);
      if (!tr.classList.contains("mx-sem") && v) {
        tr.classList.add("mx-sem");
        tr.classList.add(v.pctMin >= 1 ? "mx-green" : v.pctMin >= 0.8 ? "mx-yellow" : "mx-red");
      }
      if (!tr.classList.contains("mx-clickable")) {
        tr.classList.add("mx-clickable");
        tr.setAttribute("title", "Ver ficha de " + name);
        tr.addEventListener("click", function () { openFicha(name); });
      }
    });
  }

  /* refresca el contador de alertas (cuando cambian datos) */
  function refreshAlertBadge() {
    var btn = document.querySelector(".mx-alertas-btn");
    if (!btn) return;
    var old = btn.querySelector(".mx-badge");
    var n = countAlertasRed();
    if (old) old.remove();
    if (n > 0) { var b = el("span", "mx-badge", String(n)); btn.appendChild(b); }
  }

  function runAll() {
    injectTopbar();
    enhanceKPIs();
    enhanceRanking();
    refreshAlertBadge();
  }

  /* Observer permanente: re-aplica tras cada render de React */
  var scheduled = false;
  var obs = new MutationObserver(function () {
    if (scheduled) return; scheduled = true;
    requestAnimationFrame(function () { scheduled = false; runAll(); });
  });
  obs.observe(document.body, { childList: true, subtree: true });
  runAll();
})();

</script>

</body></html>
