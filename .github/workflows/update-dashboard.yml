name: Actualizar Dashboard Diario

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

concurrency:
  group: dashboard-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generar dashboard
        run: python3 generar.py

      - name: Publicar via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api repos/${{ github.repository }}/contents/index.html --jq '.sha')
          CONTENT=$(base64 -w 0 < index.html)
          TIMESTAMP=$(TZ='America/La_Paz' date '+%d/%m/%Y %H:%M')
          gh api --method PUT repos/${{ github.repository }}/contents/index.html \
            -f message="Dashboard $TIMESTAMP" \
            -f content="$CONTENT" \
            -f sha="$SHA"
