name: Actualizar Dashboard Diario

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generar y publicar dashboard
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          # Asegurar que estamos en el HEAD exacto del remoto
          git fetch origin
          git reset --hard origin/main

          # Generar dashboard con datos frescos
          python3 generar.py
          git add index.html
          git diff --staged --quiet && echo "Sin cambios" && exit 0

          git commit -m "Dashboard $(TZ='America/La_Paz' date '+%d/%m/%Y %H:%M')"

          # Push con reintento si llega un commit nuevo entre el fetch y el push
          git push origin HEAD:main || \
            (git pull --rebase origin main && git push origin HEAD:main)
