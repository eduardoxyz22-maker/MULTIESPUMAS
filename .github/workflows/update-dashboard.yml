name: Actualizar Dashboard Diario

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

concurrency:
  group: dashboard-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generar dashboard
        run: python3 generar.py

      - name: Publicar via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          SHA=$(gh api "repos/$GITHUB_REPOSITORY/contents/index.html" --jq '.sha')
          TIMESTAMP=$(TZ='America/La_Paz' date '+%d/%m/%Y %H:%M')
          SHA="$SHA" TIMESTAMP="$TIMESTAMP" python3 -c "
import json, base64, os, urllib.request

sha       = os.environ['SHA']
timestamp = os.environ['TIMESTAMP']
repo      = os.environ['GITHUB_REPOSITORY']
token     = os.environ['GH_TOKEN']

with open('index.html', 'rb') as f:
    content = base64.b64encode(f.read()).decode()

payload = json.dumps({'message': f'Dashboard {timestamp}', 'content': content, 'sha': sha}).encode()

req = urllib.request.Request(
    f'https://api.github.com/repos/{repo}/contents/index.html',
    data=payload, method='PUT'
)
req.add_header('Authorization', f'token {token}')
req.add_header('Content-Type', 'application/json')
with urllib.request.urlopen(req) as r:
    print('Publicado OK, status:', r.status)
"
