name: Actualizar Dashboard Diario

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

concurrency:
  group: dashboard-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generar dashboard
        run: python3 generar.py

      - name: Publicar via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 publish.py
