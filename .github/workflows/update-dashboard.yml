name: Actualizar Dashboard Diario

on:
  schedule:
    # 11:00 AM Mexico City (UTC-6) = 17:00 UTC
    - cron: '0 17 * * *'
  workflow_dispatch:  # permite ejecutar manualmente

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Actualizar fecha en dashboard
        run: |
          # Fecha y hora en formato Mexico
          FECHA=$(TZ='America/Mexico_City' date '+%d/%m/%Y %H:%M')
          MES=$(TZ='America/Mexico_City' date '+%B %Y' | python3 -c "
import sys
months = {
  'January':'Ene','February':'Feb','March':'Mar','April':'Abr',
  'May':'May','June':'Jun','July':'Jul','August':'Ago',
  'September':'Sep','October':'Oct','November':'Nov','December':'Dic'
}
line = sys.stdin.read().strip()
for en,es in months.items():
  line = line.replace(en, es)
print(line)
")
          echo "Actualizando a: $FECHA"
          
          # Reemplazar fecha en el HTML
          sed -i "s|Generado: [0-9/]* [0-9:]* |Generado: $FECHA |g" index.html
          sed -i "s|[0-9][0-9]/[0-9][0-9]/[0-9][0-9][0-9][0-9] [0-9][0-9]:[0-9][0-9]</div>|${FECHA}</div>|g" index.html

      - name: Commit y push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          FECHA=$(TZ='America/Mexico_City' date '+%d/%m/%Y %H:%M')
          git add index.html
          git diff --staged --quiet || git commit -m "Dashboard actualizado - $FECHA"
          git push
