name: Actualizar Dashboard Diario

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generar y publicar dashboard
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git pull origin main
          python3 generar.py
          git add index.html
          git diff --staged --quiet || git commit -m "Dashboard $(TZ='America/La_Paz' date '+%d/%m/%Y %H:%M')"
          git push origin main
