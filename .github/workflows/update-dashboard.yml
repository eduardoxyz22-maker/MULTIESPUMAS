name: Actualizar Dashboard Diario

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
h
    steps:
      - uses: actions/checkout@v4

      - name: Generar dashboard
        run: python3 generar.py

      - name: Publicar
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --staged --quiet || git commit -m "Dashboard $(TZ='America/Mexico_City' date '+%d/%m/%Y %H:%M')"
          git push
