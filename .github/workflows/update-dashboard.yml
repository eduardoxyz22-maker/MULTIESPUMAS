name: Actualizar Dashboard Diario

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Mostrar IP publica del runner
        run: |
          IP=$(curl -sf https://api.ipify.org || echo "no disponible")
          echo "IP del runner: $IP"
          echo "Si el dashboard falla con 403, agrega esta IP al allowlist de Kommo:"
          echo "  eanez.kommo.com → Configuracion → Integraciones → IP restrictions"

      - name: Generar dashboard
        run: python3 generar.py

      - name: Publicar
        if: always()
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --staged --quiet || git commit -m "Dashboard $(TZ='America/La_Paz' date '+%d/%m/%Y %H:%M')"
          git push
