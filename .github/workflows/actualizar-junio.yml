name: Actualizar Junio 2026

on:
  workflow_dispatch:        # Manual desde GitHub -> Actions -> Run workflow

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GLOBAL_SHEET: "JUNIO GLOBAL"            # pestana GLOBAL del mes en el Excel
      OUT_FILE: "dashboard-junio-2026.html"   # archivo que se genera y publica
      MES_NOMBRE: "Junio"
      ANIO: "2026"

    steps:
      - uses: actions/checkout@v4

      - name: Obtener dashboard-template.html
        run: |
          if [ ! -f dashboard-template.html ]; then
            git fetch origin claude/trello-board-cards-api-K5JwL
            git checkout origin/claude/trello-board-cards-api-K5JwL -- dashboard-template.html
            echo "Template obtenido desde rama de desarrollo"
          else
            echo "Template ya existe en main"
          fi

      - name: Descargar Excel desde Google Drive
        run: |
          FILE_ID="11zVfvcNXa3v0bmOL5J4OWNHMcU7R-C56"
          curl -fL "https://docs.google.com/spreadsheets/d/${FILE_ID}/export?format=xlsx" \
               -o datos.xlsx
          ls -lh datos.xlsx
          if [ "$(head -c 2 datos.xlsx)" != "PK" ]; then
            echo "ERROR: la descarga no es un .xlsx valido."
            echo "Verifica que el archivo de Drive sea publico (cualquiera con el enlace puede ver)."
            head -c 300 datos.xlsx
            exit 1
          fi
          echo "Excel descargado y validado correctamente."

      - name: Generar dashboard-junio-2026.html
        run: python3 generar_comercial.py

      - name: Publicar en main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 publish_comercial.py
