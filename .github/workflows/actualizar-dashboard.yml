name: Actualizar Dashboard desde Google Drive

on:
  workflow_dispatch:        # Manual desde GitHub → Actions → Run workflow
  schedule:
    - cron: '0 21 * * *' # Todos los días 17:00 Bolivia (21:00 UTC)

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Obtener dashboard-template.html
        run: |
          if [ ! -f dashboard-template.html ]; then
            git fetch origin claude/trello-board-cards-api-K5JwL
            git checkout origin/claude/trello-board-cards-api-K5JwL -- dashboard-template.html
            echo "Template obtenido desde rama de desarrollo"
          else
            echo "Template ya existe en main"
          fi

      - name: Descargar Excel desde Google Drive
        run: |
          FILE_ID="11zVfvcNXa3v0bmOL5J4OWNHMcU7R-C56"
          curl -L "https://docs.google.com/spreadsheets/d/${FILE_ID}/export?format=xlsx" \
               -o datos.xlsx
          ls -lh datos.xlsx

      - name: Generar dashboard-comercial.html
        run: python3 generar_dashboard.py

      - name: Publicar dashboard en main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 publish_comercial.py

      - name: Publicar template en main (primera vez)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 publish_template.py
