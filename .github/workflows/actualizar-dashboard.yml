name: Actualizar Dashboard desde Google Drive

on:
  workflow_dispatch:        # Manual desde GitHub → Actions → Run workflow
  schedule:
    - cron: '0 21 * * *' # Todos los días 17:00 Bolivia (21:00 UTC)

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Descargar Excel desde Google Drive
        run: |
          FILE_ID="11zVfvcNXa3v0bmOL5J4OWNHMcU7R-C56"
          curl -L "https://docs.google.com/spreadsheets/d/${FILE_ID}/export?format=xlsx" \
               -o datos.xlsx
          ls -lh datos.xlsx

      - name: Generar dashboard-comercial.html
        run: python3 generar_dashboard.py

      - name: Publicar en main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 publish_comercial.py
