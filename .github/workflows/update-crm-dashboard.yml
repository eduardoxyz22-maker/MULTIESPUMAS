name: Actualizar Dashboard CRM Diario

on:
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * *' # 11:00 AM hora México (17:00 UTC)

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generar index.html desde Kommo
        run: python3 generar.py

      - name: Commit y push index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/debug.json
          git diff --cached --quiet || git commit -m "Dashboard CRM actualizado $(date '+%Y-%m-%d %H:%M')"
          git push
