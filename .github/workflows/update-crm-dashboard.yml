name: Actualizar Dashboard CRM Diario

on:
  schedule:
    - cron: '0 17 * * *'   # 11:00 AM hora México (UTC-6)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'generar.py'
      - 'Panel.jsx'
      - 'Views.jsx'
      - 'panel.css'

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias Node para compilar JSX
        run: npm install --no-save @babel/core @babel/preset-react react@18.3.1 react-dom@18.3.1

      - name: Generar index.html desde Kommo
        run: python3 generar.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}

      - name: Commit y push index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html panel.html index_legacy.html
          git add panel_*.html 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Dashboard CRM actualizado $(date '+%Y-%m-%d %H:%M')"
          git pull --rebase origin main || true
          git push
