name: Reporte Semanal ATC

on:
  schedule:
    - cron: '0 14 * * 1'   # Cada lunes 10:00 AM Bolivia (UTC-4)
  workflow_dispatch:         # Ejecución manual desde GitHub → Actions

concurrency:
  group: reporte-atc
  cancel-in-progress: true

jobs:
  generar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generar reportes desde Trello
        env:
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN:   ${{ secrets.TRELLO_TOKEN }}
        run: python3 generar_reporte_atc.py

      - name: Publicar todo en un solo commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reporte-semanal-atc.html reporte-atc-20260522.html atc-semanal.csv
          FECHA=$(TZ='America/La_Paz' date '+%d/%m/%Y %H:%M')
          git commit -m "Reporte Semanal ATC $FECHA (auto)" || { echo "sin cambios"; exit 0; }
          git push
