      <span class="size-label">${SIZE_LABELS[s]}</span>
      <span class="price-val">${fmt(p.combo_sr[s])}</span>
    </div>`).join('') : '<div style="color:#9BA4B0;font-size:12px;font-family:monospace">No disponible</div>';

  const specs = [];
  if (p.height_cm) specs.push(`<span class="fp">${p.height_cm} cm alto</span>`);
  if (p.weight_kg) specs.push(`<span class="fp">${p.weight_kg} kg máx</span>`);

  return `
  <div class="cmp-col ${headerClass}">
    <div class="cmp-header">
      <div class="brand-badge">${badgeText}</div>
      <div class="cmp-name">${p.name}</div>
      <div class="cmp-type">${p.type}</div>
    </div>
    <div class="cmp-section">
      <div class="section-label">Características</div>
      ${pillsHTML(p.features)}
      ${specs.join('')}
      ${p.notes ? `<div style="margin-top:8px;font-size:11px;color:#9BA4B0;font-family:monospace">${p.notes}</div>` : ''}
    </div>
    <div class="cmp-section">
      <div class="section-label">Solo colchón</div>
      ${sizeRows}
    </div>
    <div class="cmp-section">
      <div class="section-label">Combo + Somier</div>
      ${comboSRows}
    </div>
    <div class="cmp-section">
      <div class="section-label">Combo + Somier + Respaldar</div>
      ${comboSRRows}
    </div>
  </div>`;
}

function renderVerdict(pA, pB) {
  const types = [
    {label:'Solo colchón', keyA:'prices', keyB:'prices'},
    {label:'+ Somier', keyA:'combo_s', keyB:'combo_s'},
    {label:'+ Somier + Respaldar', keyA:'combo_sr', keyB:'combo_sr'},
  ];
  const allSizes = SIZES.filter(s => types.some(t => pA[t.keyA][s] || pB[t.keyB][s]));

  let rows = '';
  types.forEach(t => {
    const relevantSizes = allSizes.filter(s => pA[t.keyA][s] || pB[t.keyB][s]);
    if (!relevantSizes.length) return;
    relevantSizes.forEach(s => {
      const vA = pA[t.keyA][s];
      const vB = pB[t.keyB][s];
      let diffHTML = '<span class="na">—</span>';
      let winner = '<span class="na">—</span>';
      if (vA != null && vB != null) {
        const diff = vA - vB;
        if (Math.abs(diff) <= 30) {
          diffHTML = `<span class="diff-eq">≈ IGUAL</span>`;
          winner = '<span class="diff-eq">Empate</span>';
        } else if (diff < 0) {
          diffHTML = `<span class="diff-win">A gana ${Math.abs(diff).toLocaleString()} Bs</span>`;
          winner = `<strong>${pA.name}</strong>`;
        } else {
          diffHTML = `<span class="diff-lose">B gana ${Math.abs(diff).toLocaleString()} Bs</span>`;
          winner = `<strong>${pB.name}</strong>`;
        }
      } else if (vA == null && vB != null) {
        diffHTML = '<span class="na">A sin dato</span>';
      } else if (vA != null && vB == null) {
        diffHTML = '<span class="na">B sin dato</span>';
      }
      rows += `<tr>
        <td>${t.label}</td>
        <td>${SIZE_LABELS[s]}</td>
        <td style="font-weight:700">${vA != null ? vA.toLocaleString()+' Bs' : '<span class="na">—</span>'}</td>
        <td style="font-weight:700">${vB != null ? vB.toLocaleString()+' Bs' : '<span class="na">—</span>'}</td>
        <td>${diffHTML}</td>
        <td>${winner}</td>
      </tr>`;
    });
  });

  return `
  <div class="verdict-wrap">
    <div class="verdict-header">⚖️ Tabla comparativa de precios — ${pA.name} vs ${pB.name}</div>
    <table class="verdict-table">
      <thead><tr>
        <th>Tipo</th><th>Tamaño</th>
        <th>${pA.name} <span style="font-weight:400;opacity:.6">(${pA.brand})</span></th>
        <th>${pB.name} <span style="font-weight:400;opacity:.6">(${pB.brand})</span></th>
        <th>Diferencia</th>
        <th>Más barato</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function render() {
  const idA = selA.value, idB = selB.value;
  if (!idA || !idB) {
    document.getElementById('output').innerHTML = '<div class="placeholder">// Selecciona dos productos para ver la comparativa lado a lado</div>';
    return;
  }
  const pA = PRODUCTS.find(p => p.id === idA);
  const pB = PRODUCTS.find(p => p.id === idB);
  if (!pA || !pB) return;

  document.getElementById('output').innerHTML = `
    <div class="cmp-wrap">${renderCard(pA)}${renderCard(pB)}</div>
    ${renderVerdict(pA, pB)}
  `;
}

render();
</script>
</body>
</html>
