const selA=document.getElementById('selA'),selB=document.getElementById('selB');
const groups={};
PRODUCTS.forEach(p=>{
  const g=p.isSuena?'🟢 SUEÑA':`⬜ Competencia — ${p.brand}`;
  if(!groups[g])groups[g]=[];
  groups[g].push(p);
});
[selA,selB].forEach(sel=>{
  Object.entries(groups).forEach(([gn,prods])=>{
    const og=document.createElement('optgroup');og.label=gn;
    prods.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.name+(p.isSuena?'':' ('+p.brand+')');og.appendChild(o);});
    sel.appendChild(og);
  });
});
selA.value='s_essential';selB.value='c_ultrasoft';

let ACTIVE_TAB='resumen',BAR_MODE='solo';
let PA=null,PB=null;

function fmt(n){return n==null?'—':n.toLocaleString('es-BO')+' Bs'}

function pills(feats){
  return feats.map(f=>`<span class="fp${KEY_F.has(f)?' t':''}">${f}</span>`).join('');
}

function prodCard(p){
  const cls=p.isSuena?'suena':'comp';
  const specs=[];
  if(p.height_cm)specs.push(`<span class="fp">${p.height_cm} cm</span>`);
  if(p.weight_kg)specs.push(`<span class="fp">${p.weight_kg} kg máx</span>`);
  return `<div class="prod-card ${cls}">
    <div class="pc-head">
      <div class="brand-pill">${p.isSuena?'SUEÑA':p.brand.toUpperCase()}</div>
      <div class="prod-name">${p.name}</div>
      <div class="prod-type">${p.type}</div>
    </div>
    <div class="pc-feats">${pills(p.features)}${specs.join('')}</div>
    <div class="pc-meta">
      <div class="mi"><div class="mi-lbl">Categoría</div><div class="mi-val" style="font-size:12px">${p.category}</div></div>
      ${p.height_cm?`<div class="mi"><div class="mi-lbl">Alto</div><div class="mi-val">${p.height_cm}cm</div></div>`:''}
      ${p.weight_kg?`<div class="mi"><div class="mi-lbl">Carga</div><div class="mi-val">${p.weight_kg}kg</div></div>`:''}
    </div>
    ${p.notes?`<div class="pc-notes">${p.notes}</div>`:''}
  </div>`;
}

function tabResumen(pA,pB){
  let wA=0,wB=0,ties=0,tot=0;
  SIZES.forEach(s=>{const a=pA.prices[s],b=pB.prices[s];if(a!=null&&b!=null){tot++;const d=a-b;if(Math.abs(d)<=30)ties++;else if(d<0)wA++;else wB++;}});
  const base=wA+wB+ties||1;
  const wrRows=SIZES.filter(s=>pA.prices[s]!=null||pB.prices[s]!=null).map(s=>{
    const a=pA.prices[s],b=pB.prices[s];
    let dc='na',dt='—';
    if(a!=null&&b!=null){const d=a-b;if(Math.abs(d)<=30){dc='eq';dt='≈ igual';}else if(d<0){dc='win';dt=`-${Math.abs(d).toLocaleString()} Bs`;}else{dc='lose';dt=`+${Math.abs(d).toLocaleString()} Bs`;}}
    return `<div class="wr"><span class="wr-size">${SL[s]}</span><span class="wr-p wr-pa">${fmt(a)}</span><span class="wr-diff ${dc}">${dt}</span><span class="wr-p wr-pb">${fmt(b)}</span></div>`;
  }).join('');
  return `
  <div class="score-row"><span style="color:var(--teal)">${pA.name}: ${wA} victorias</span><span style="color:rgba(255,255,255,.3)">${ties} empate${ties!==1?'s':''}</span><span style="color:var(--violet)">${pB.name}: ${wB} victorias</span></div>
  <div class="score-track"><div class="sf-a" style="width:${Math.round(wA/base*100)}%"></div><div class="sf-b" style="width:${Math.round(wB/base*100)}%"></div></div>
  <div class="price-mode-lbl">Precios solo colchón</div>
  <div class="winner-rows">${wrRows}</div>
  <div class="metric-cards">
    <div class="mc"><div class="mc-lbl">Altura colchón</div><div class="mc-vals"><div class="mcv"><div class="v" style="color:var(--teal)">${pA.height_cm?pA.height_cm+'cm':'—'}</div><div class="l">${pA.name}</div></div><div class="mcv"><div class="v" style="color:var(--violet)">${pB.height_cm?pB.height_cm+'cm':'—'}</div><div class="l">${pB.name}</div></div></div></div>
    <div class="mc"><div class="mc-lbl">Carga máxima</div><div class="mc-vals"><div class="mcv"><div class="v" style="color:var(--teal)">${pA.weight_kg?pA.weight_kg+'kg':'—'}</div><div class="l">${pA.name}</div></div><div class="mcv"><div class="v" style="color:var(--violet)">${pB.weight_kg?pB.weight_kg+'kg':'—'}</div><div class="l">${pB.name}</div></div></div></div>
    <div class="mc"><div class="mc-lbl">Categoría</div><div class="mc-vals"><div class="mcv"><div class="v" style="color:var(--teal);font-size:13px">${pA.category}</div><div class="l">${pA.name}</div></div><div class="mcv"><div class="v" style="color:var(--violet);font-size:13px">${pB.category}</div><div class="l">${pB.name}</div></div></div></div>
  </div>`;
}

function barRowsHTML(pA,pB,mode){
  const mk={solo:'prices',somier:'combo_s',sr:'combo_sr'};
  const key=mk[mode];
  const sizes=SIZES.filter(s=>pA[key][s]!=null||pB[key][s]!=null);
  if(!sizes.length)return '<div class="placeholder">Sin datos para este modo</div>';
  const maxV=Math.max(...sizes.map(s=>Math.max(pA[key][s]||0,pB[key][s]||0)));
  return sizes.map(s=>{
    const a=pA[key][s],b=pB[key][s];
    const wA=a!=null?Math.max(8,Math.round(a/maxV*100)):0;
    const wB=b!=null?Math.max(8,Math.round(b/maxV*100)):0;
    return `<div class="bar-row">
      <div class="br-size">${SL[s]}</div>
      <div class="bar-pair">
        <div class="bar-item"><div class="bar-brand" style="color:var(--teal)">${pA.name.substring(0,12)}</div><div class="bar-track"><div class="bar-fill a" style="width:${a!=null?wA:0}%"><span class="bar-price">${a!=null?a.toLocaleString()+' Bs':'—'}</span></div></div></div>
        <div class="bar-item"><div class="bar-brand" style="color:var(--violet)">${pB.name.substring(0,12)}</div><div class="bar-track"><div class="bar-fill b" style="width:${b!=null?wB:0}%"><span class="bar-price">${b!=null?b.toLocaleString()+' Bs':'—'}</span></div></div></div>
      </div>
    </div>`;
  }).join('');
}

function tabGrafico(pA,pB){
  const btns=['solo:Solo colchón','somier:+ Somier','sr:+ S + Respaldar'];
  const togglesHTML=btns.map(b=>{const[m,l]=b.split(':');return `<button class="bt${BAR_MODE===m?' active':''}" onclick="setBarMode('${m}')">${l}</button>`;}).join('');
  return `<div class="bar-toggles">${togglesHTML}</div><div class="bar-rows" id="bar-rows">${barRowsHTML(pA,pB,BAR_MODE)}</div>`;
}

function tabMatrix(pA,pB){
  const allF=[...new Set([...pA.features,...pB.features])];
  const rows=allF.map(f=>{
    const hA=pA.features.includes(f),hB=pB.features.includes(f);
    return `<tr><td class="${KEY_F.has(f)?'feat-key':''}">${f}</td><td class="${hA?'chk':'crs'}">${hA?'✓':'–'}</td><td class="${hB?'chk':'crs'}">${hB?'✓':'–'}</td></tr>`;
  }).join('');
  return `<table class="mx-table"><thead><tr><th>Característica</th><th class="c" style="color:var(--teal)">${pA.name}</th><th class="c" style="color:var(--violet)">${pB.name}</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function tabTabla(pA,pB){
  const groups=[{l:'Solo colchón',kA:'prices',kB:'prices'},{l:'+ Somier',kA:'combo_s',kB:'combo_s'},{l:'+ Somier + Respaldar',kA:'combo_sr',kB:'combo_sr'}];
  let rows='';
  groups.forEach(g=>{
    const szs=SIZES.filter(s=>pA[g.kA][s]!=null||pB[g.kB][s]!=null);
    if(!szs.length)return;
    rows+=`<tr class="gh"><td colspan="4">${g.l}</td></tr>`;
    szs.forEach(s=>{
      const a=pA[g.kA][s],b=pB[g.kB][s];
      let dh='<span class="na">—</span>';
      if(a!=null&&b!=null){const d=a-b;if(Math.abs(d)<=30)dh='<span class="de">≈ igual</span>';else if(d<0)dh=`<span class="dw">A −${Math.abs(d).toLocaleString()} Bs</span>`;else dh=`<span class="dl">B −${Math.abs(d).toLocaleString()} Bs</span>`;}
      else if(a==null&&b!=null)dh='<span class="na">A sin dato</span>';
      else if(a!=null&&b==null)dh='<span class="na">B sin dato</span>';
      rows+=`<tr><td style="color:var(--muted)">${SL[s]}</td><td style="font-weight:700;color:var(--teal)">${a!=null?a.toLocaleString()+' Bs':'<span class="na">—</span>'}</td><td style="font-weight:700;color:var(--violet)">${b!=null?b.toLocaleString()+' Bs':'<span class="na">—</span>'}</td><td>${dh}</td></tr>`;
    });
  });
  return `<table class="pt"><thead><tr><th>Tamaño</th><th style="color:var(--teal)">${pA.name}</th><th style="color:var(--violet)">${pB.name}</th><th>Diferencia</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function setBarMode(m){
  BAR_MODE=m;
  document.querySelectorAll('.bt').forEach(b=>b.classList.toggle('active',b.textContent.trim()===({solo:'Solo colchón',somier:'+ Somier',sr:'+ S + Respaldar'}[m])));
  const el=document.getElementById('bar-rows');
  if(el&&PA&&PB)el.innerHTML=barRowsHTML(PA,PB,m);
}

function switchTab(id){
  ACTIVE_TAB=id;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.toggle('active',p.id==='tp-'+id));
}

function render(){
  const idA=selA.value,idB=selB.value;
  if(!idA||!idB){document.getElementById('output').innerHTML='<div class="placeholder">// Selecciona dos productos para ver la comparativa</div>';return;}
  PA=PRODUCTS.find(p=>p.id===idA);
  PB=PRODUCTS.find(p=>p.id===idB);
  if(!PA||!PB)return;

  document.getElementById('output').innerHTML=`
    <div class="prod-grid">${prodCard(PA)}${prodCard(PB)}</div>
    <div class="glass tab-area">
      <div class="tab-nav">
        <button class="tab-btn" data-tab="resumen" onclick="switchTab('resumen')">Resumen</button>
        <button class="tab-btn" data-tab="grafico" onclick="switchTab('grafico')">Gráfico</button>
        <button class="tab-btn" data-tab="matrix" onclick="switchTab('matrix')">Características</button>
        <button class="tab-btn" data-tab="tabla" onclick="switchTab('tabla')">Tabla completa</button>
      </div>
      <div id="tp-resumen" class="tab-pane">${tabResumen(PA,PB)}</div>
      <div id="tp-grafico" class="tab-pane">${tabGrafico(PA,PB)}</div>
      <div id="tp-matrix" class="tab-pane">${tabMatrix(PA,PB)}</div>
      <div id="tp-tabla" class="tab-pane">${tabTabla(PA,PB)}</div>
    </div>`;

  switchTab(ACTIVE_TAB);
}

render();
</script>
</body>
</html>
