<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard CRM — HEAVEN Colchones · __MES_LABEL__</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:light;
  --ink:#0F1620; --ink-2:#19222F; --ink-3:#27313F;
  --bg:#F3F5F7; --card:#FFFFFF; --line:#E6E9EE; --line-2:#EFF1F4;
  --text:#16202C; --muted:#646E7B; --faint:#9AA3AF;
  --brand:#00B5AD; --brand-d:#0A7D77; --brand-bg:#E0F4F2; --brand-ink:#065450;
  --green:#159A57; --green-bg:#E7F5ED; --green-ink:#0C5C34;
  --amber:#D98300; --amber-bg:#FBF0DA; --amber-ink:#7A4A00;
  --red:#DC4046; --red-bg:#FBE8E9; --red-ink:#871F23;
  --blue:#2E6FE0; --blue-bg:#E6EEFB;
  --r:14px; --r-sm:10px; --r-lg:18px;
  --sh:0 1px 2px rgba(15,22,32,.04),0 4px 16px rgba(15,22,32,.05);
  --sh-lg:0 8px 32px rgba(15,22,32,.10);
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --hover:#FAFBFC;
}
html[data-theme="dark"]{
  color-scheme:dark;
  --ink:#0B0F14; --ink-2:#11161D; --ink-3:#212A36;
  --bg:#0E131A; --card:#161D27; --line:#28313D; --line-2:#1F2731;
  --text:#E6EAEF; --muted:#9AA6B2; --faint:#6E7986;
  --brand:#16C8BF; --brand-d:#3FD9D1; --brand-bg:#0C3633; --brand-ink:#8BEAE4;
  --green:#2BB56E; --green-bg:#10301F; --green-ink:#74D9A4;
  --amber:#E89A1C; --amber-bg:#3A2A0C; --amber-ink:#F0C173;
  --red:#E8585D; --red-bg:#3A1719; --red-ink:#F0989B;
  --blue:#4A86F0; --blue-bg:#14223A;
  --sh:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.35);
  --sh-lg:0 8px 32px rgba(0,0,0,.5);
  --hover:#1C2530;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Hanken Grotesk',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;
  display:flex;min-height:100vh;
}
.num{font-variant-numeric:tabular-nums}
.mono{font-family:var(--mono)}

/* ============ SIDEBAR ============ */
.rail{
  width:230px;flex-shrink:0;background:var(--ink);color:#C9D2DC;
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
}
.brand{padding:22px 22px 18px;border-bottom:1px solid rgba(255,255,255,.07)}
.brand-logo{display:flex;align-items:baseline;gap:7px;color:#fff}
.brand-logo .h{font-size:1.35rem;font-weight:800;letter-spacing:1.5px}
.brand-logo .mark{color:var(--brand);font-size:1rem}
.brand-sub{font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:#6B7785;margin-top:3px;font-weight:600}
.nav{padding:14px 12px;display:flex;flex-direction:column;gap:2px;flex:1}
.nav-label{font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;color:#5C6775;font-weight:700;padding:10px 12px 6px}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;
  cursor:pointer;color:#AAB4C0;font-weight:600;font-size:.83rem;
  border:none;background:none;text-align:left;width:100%;transition:.15s;
}
.nav-item svg{width:17px;height:17px;flex-shrink:0;stroke-width:2}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-item.active{background:var(--brand);color:#04302E;box-shadow:0 4px 14px rgba(0,181,173,.3)}
.nav-item .badge{margin-left:auto;font-size:.66rem;font-weight:800;background:rgba(220,64,70,.9);color:#fff;border-radius:99px;padding:1px 7px;font-variant-numeric:tabular-nums}
.nav-item.active .badge{background:rgba(4,48,46,.25);color:#04302E}
.rail-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);font-size:.66rem;color:#6B7785;line-height:1.5}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:6px;box-shadow:0 0 0 0 rgba(21,154,87,.5);animation:pulse 2.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(21,154,87,.5)}70%{box-shadow:0 0 0 7px rgba(21,154,87,0)}100%{box-shadow:0 0 0 0 rgba(21,154,87,0)}}

/* ============ MAIN ============ */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  background:var(--card);border-bottom:1px solid var(--line);
  padding:16px 30px;display:flex;align-items:center;justify-content:space-between;gap:20px;
  position:sticky;top:0;z-index:20;
}
.topbar h1{font-size:1.12rem;font-weight:800;letter-spacing:-.3px}
.topbar .crumb{font-size:.72rem;color:var(--faint);font-weight:600;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:1px}
.topbar-right{display:flex;align-items:center;gap:14px}
.meta-chip{font-size:.72rem;color:var(--muted);font-family:var(--mono);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px 11px}
.btn{font-family:inherit;font-weight:700;font-size:.78rem;border-radius:9px;padding:8px 15px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--text);display:inline-flex;align-items:center;gap:7px;transition:.15s}
.btn:hover{border-color:var(--brand);color:var(--brand-d)}
.btn-primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn-primary:hover{background:var(--ink-3);color:#fff}
.btn svg{width:14px;height:14px;stroke-width:2.2}

.scroll{flex:1;overflow-y:auto;padding:26px 30px 60px}
.view{display:none;opacity:1}
@keyframes viewIn{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.btn svg.spin{animation:spin .8s linear infinite;}
.view.active{display:block;animation:viewIn .22s ease-out}

/* ============ GENERIC ============ */
.section-head{display:flex;align-items:flex-end;justify-content:space-between;margin:30px 0 14px;gap:16px}
.section-head:first-child{margin-top:0}
.section-head h2{font-size:1.02rem;font-weight:800;letter-spacing:-.2px}
.section-head p{font-size:.78rem;color:var(--muted);margin-top:2px;max-width:62ch}
.eyebrow{font-size:.64rem;letter-spacing:1.6px;text-transform:uppercase;color:var(--faint);font-weight:700}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}

/* diagnostic banner */
.diag{background:linear-gradient(120deg,var(--ink),var(--ink-3));color:#E8EDF2;border-radius:var(--r-lg);padding:26px 30px;display:grid;grid-template-columns:1.4fr 1fr;gap:30px;align-items:center;position:relative;overflow:hidden}
.diag::after{content:"";position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(0,181,173,.22),transparent 70%)}
.diag .tag{display:inline-flex;align-items:center;gap:7px;font-size:.66rem;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--brand);background:rgba(0,181,173,.13);border:1px solid rgba(0,181,173,.3);padding:5px 11px;border-radius:99px;margin-bottom:13px}
.diag h2{font-size:1.55rem;font-weight:800;line-height:1.22;letter-spacing:-.4px;color:#fff;text-wrap:balance}
.diag h2 em{font-style:normal;color:var(--brand);background:linear-gradient(transparent 62%,rgba(0,181,173,.28) 62%)}
.diag p{font-size:.86rem;color:#9FAAB6;margin-top:11px;line-height:1.55}
.diag-stats{display:flex;gap:8px;position:relative;z-index:1}
.diag-stat{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 14px}
.diag-stat .v{font-size:1.5rem;font-weight:800;color:#fff;line-height:1}
.diag-stat .v.bad{color:#FF8A8E}
.diag-stat .v.good{color:#46D6A6}
.diag-stat .l{font-size:.66rem;color:#8C97A4;margin-top:5px;font-weight:600;line-height:1.3}

/* KPI grid */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:14px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:17px 18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi .accent{position:absolute;left:0;top:0;bottom:0;width:3px}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.kpi-label{font-size:.7rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.kpi-ico{width:30px;height:30px;border-radius:8px;display:grid;place-items:center}
.kpi-ico svg{width:16px;height:16px;stroke-width:2}
.kpi-val{font-size:1.85rem;font-weight:800;line-height:1;letter-spacing:-.5px}
.kpi-sub{font-size:.74rem;color:var(--muted);margin-top:7px;display:flex;align-items:center;gap:6px}
.delta{font-weight:800;font-size:.72rem;padding:1px 7px;border-radius:6px;display:inline-flex;align-items:center;gap:2px}
.delta.up{color:var(--green-ink);background:var(--green-bg)}
.delta.down{color:var(--red-ink);background:var(--red-bg)}

/* status pill */
.st{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.st .d{width:7px;height:7px;border-radius:50%}
.st-green{color:var(--green-ink);background:var(--green-bg)} .st-green .d{background:var(--green)}
.st-amber{color:var(--amber-ink);background:var(--amber-bg)} .st-amber .d{background:var(--amber)}
.st-red{color:var(--red-ink);background:var(--red-bg)} .st-red .d{background:var(--red)}

/* table */
.tbl{width:100%;border-collapse:collapse;font-size:.82rem}
.tbl thead th{text-align:left;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none}
.tbl thead th.r{text-align:right}
.tbl thead th .arr{opacity:0;font-size:.7rem;margin-left:3px}
.tbl thead th.sorted .arr{opacity:1}
.tbl tbody td{padding:12px 14px;border-bottom:1px solid var(--line-2);color:var(--text)}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background .12s}
.tbl tbody tr:hover{background:var(--hover)}
.tbl td.r{text-align:right;font-variant-numeric:tabular-nums}
.tbl td.bold{font-weight:800}
.tbl .who{font-weight:700}
.tbl .where{font-size:.72rem;color:var(--faint);font-weight:600}

/* mini bar */
.mbar{height:7px;background:var(--line-2);border-radius:99px;overflow:hidden;min-width:60px}
.mbar i{display:block;height:100%;border-radius:99px}

/* team cards */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;margin-top:14px}
.tcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;border-top:3px solid var(--line);position:relative}
.tcard.v-green{border-top-color:var(--green)} .tcard.v-amber{border-top-color:var(--amber)} .tcard.v-red{border-top-color:var(--red)}
.tcard-h{padding:15px 17px 13px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.avatar{width:38px;height:38px;border-radius:10px;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:800;font-size:.92rem;flex-shrink:0}
.tcard-name{font-weight:800;font-size:.9rem;line-height:1.2}
.tcard-where{font-size:.7rem;color:var(--faint);font-weight:600;margin-top:2px}
.tcard-body{padding:0 17px 16px}
.tmetrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;border-top:1px solid var(--line-2);padding-top:13px}
.tmetric .v{font-size:1.18rem;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.tmetric .l{font-size:.64rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:4px}
.tcard-bar{padding:11px 17px;background:var(--hover);border-top:1px solid var(--line-2);display:flex;align-items:center;justify-content:space-between;font-size:.72rem;color:var(--muted)}
.tcard-bar b{color:var(--text);font-weight:800}

/* two-col */
.cols-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cols-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.pad{padding:18px 20px}

/* insight box */
.insight{background:var(--brand-bg);border:1px solid rgba(0,181,173,.3);border-radius:var(--r);padding:16px 18px;display:flex;gap:13px;align-items:flex-start}
.insight .ic{width:34px;height:34px;border-radius:9px;background:var(--brand);color:#fff;display:grid;place-items:center;flex-shrink:0}
.insight .ic svg{width:18px;height:18px;stroke-width:2.2}
.insight b{color:var(--brand-ink)}
.insight .t{font-size:.92rem;font-weight:800;color:#06403D}
.insight .d{font-size:.8rem;color:#2C5C58;margin-top:3px;line-height:1.5}

/* funnel */
.funnel{display:flex;flex-direction:column;gap:3px}
.fstep{display:flex;align-items:center;gap:12px}
.fstep .fn{font-size:.78rem;font-weight:700;width:148px;text-align:right;flex-shrink:0}
.fbar-wrap{flex:1;display:flex;justify-content:center}
.fbar{height:38px;border-radius:7px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;color:#fff;font-weight:800;font-size:.82rem;transition:width .5s cubic-bezier(.4,0,.2,1);min-width:50px;white-space:nowrap}
.fstep .fp{width:52px;text-align:right;font-size:.76rem;color:var(--muted);font-weight:700;flex-shrink:0}
.fconn{height:3px;margin:0 auto;background:var(--line-2);width:40%;border-radius:2px}

/* scenario cards */
.scen{border:1px solid var(--line);border-radius:var(--r);padding:20px;background:var(--card);box-shadow:var(--sh);position:relative;overflow:hidden}
.scen.hot{border-color:var(--brand);box-shadow:0 0 0 1px var(--brand),var(--sh)}
.scen .stag{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
.scen .sv{font-size:2rem;font-weight:800;letter-spacing:-.5px;margin:8px 0 2px}
.scen .sv2{font-size:.92rem;font-weight:700;color:var(--brand-d)}
.scen .sd{font-size:.76rem;color:var(--muted);margin-top:10px;line-height:1.5}
.scen .pin{position:absolute;top:14px;right:14px;font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--brand-d);background:var(--brand-bg);padding:3px 9px;border-radius:99px}

/* filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.chipf{font-size:.76rem;font-weight:700;padding:7px 13px;border-radius:99px;border:1px solid var(--line);background:var(--card);cursor:pointer;color:var(--muted);transition:.15s}
.chipf:hover{border-color:var(--brand)}
.chipf.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.chipf.danger.active{background:var(--red);border-color:var(--red)}
.spacer{flex:1}

.legend{font-size:.74rem;color:var(--muted);line-height:1.55;margin-top:12px}
.legend b{color:var(--text)}
.tag-line{font-size:.7rem;color:var(--faint);font-style:italic;margin-top:8px}

/* ===== drawer (perfil) ===== */
.drawer-scrim{position:fixed;inset:0;background:rgba(15,22,32,.45);opacity:0;pointer-events:none;transition:opacity .25s;z-index:40}
.drawer-scrim.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:520px;max-width:94vw;background:var(--bg);box-shadow:-12px 0 40px rgba(15,22,32,.18);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:41;overflow-y:auto}
.drawer.show{transform:none}
.drawer-head{position:sticky;top:0;background:var(--card);border-bottom:1px solid var(--line);padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:1}
.drawer-close{border:none;background:var(--bg);width:34px;height:34px;border-radius:9px;font-size:1.3rem;color:var(--muted);cursor:pointer;line-height:1;flex-shrink:0}
.drawer-close:hover{background:var(--line);color:var(--text)}
.drawer-body{padding:20px 22px 40px}
.dr-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dr-mom{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 16px}
.dr-sec{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);margin:22px 0 11px}
.dr-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.dr-k{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 14px}
.dr-k .v{font-size:1.22rem;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.dr-k .l{font-size:.64rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-top:6px}
.suc-vcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 16px;cursor:pointer;transition:border-color .15s,box-shadow .15s;margin-bottom:10px}
.suc-vcard:hover{border-color:var(--brand);box-shadow:0 2px 8px rgba(0,181,173,.12)}
.suc-vcard:last-child{margin-bottom:0}
.tcard{cursor:pointer;transition:box-shadow .15s,transform .15s}
.tcard:hover{box-shadow:var(--sh-lg);transform:translateY(-2px)}
.tbl tbody tr.clickable{cursor:pointer}

/* ===== alertas ===== */
.alert-list{display:flex;flex-direction:column;gap:10px}
.alert-row{display:flex;gap:14px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:var(--r-sm);padding:15px 17px;box-shadow:var(--sh)}
.alert-row.sev-red{border-left-color:var(--red)}
.alert-row.sev-amber{border-left-color:var(--amber)}
.alert-row.sev-green{border-left-color:var(--green)}
.alert-row .at{font-size:.9rem;font-weight:800;color:var(--text)}
.alert-row .ad{font-size:.79rem;color:var(--muted);margin-top:4px;line-height:1.5}
.alert-side{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0;width:150px;text-align:right}
.alert-owner{font-size:.72rem;font-weight:700;color:var(--faint)}

/* ===== meta stepper (inline edit) ===== */
.meta-stepper{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--card);height:28px}
.meta-stepper button{border:none;background:var(--bg);width:26px;height:26px;cursor:pointer;font-size:1rem;line-height:1;color:var(--muted);font-weight:700;display:grid;place-items:center}
.meta-stepper button:hover{background:var(--brand-bg);color:var(--brand-d)}
.meta-input{width:42px;border:none;text-align:center;font-family:var(--mono);font-size:.84rem;font-weight:700;color:var(--text);background:var(--card);-moz-appearance:textfield;outline:none}
.meta-input.meta-input-money{width:74px;text-align:left;padding-left:1px}
.meta-pre{font-family:var(--mono);font-size:.84rem;font-weight:700;color:var(--muted);padding-left:8px}
.meta-input::-webkit-outer-spin-button,.meta-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.meta-input:focus{background:var(--brand-bg)}

/* ===== segmented toggle ===== */
.seg{display:inline-flex;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.seg-btn{border:none;background:none;font-family:inherit;font-weight:700;font-size:.76rem;color:var(--muted);padding:7px 14px;border-radius:7px;cursor:pointer;transition:.15s}
.seg-btn:hover{color:var(--text)}
.seg-btn.active{background:var(--card);color:var(--brand-d);box-shadow:var(--sh)}

/* ===== weekly chart ===== */
.wk-chart{display:flex;align-items:flex-end;gap:18px;height:180px;padding-top:8px}
.wk-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%}
.wk-bars{flex:1;display:flex;align-items:flex-end;justify-content:center;gap:5px;width:100%}
.wk-bar{width:26px;max-width:38%;border-radius:5px 5px 0 0;transition:height .3s;min-height:2px}
.wk-val{font-size:.82rem;font-weight:800;margin-top:8px;font-variant-numeric:tabular-nums}
.wk-lbl{font-size:.72rem;font-weight:700;color:var(--muted);text-align:center;margin-top:2px;line-height:1.25}
.tag-line .lg{display:inline-block;width:11px;height:8px;border-radius:2px;margin-right:5px;vertical-align:middle}

@media(max-width:1100px){

.diag-stat .v.bad{background:linear-gradient(135deg,#FF8A8E,#FFC0C2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.diag-stat .v.good{background:linear-gradient(135deg,#46D6A6,#80EEC6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
/* ── badge sin datos ── */
.zero{color:var(--faint)!important;font-style:italic}
/* ── filas backlog por urgencia ── */
.bk-crit{background:#FFF2F2!important}.bk-crit:hover{background:#FFE4E4!important}
.bk-warn{background:#FFFBF0!important}.bk-warn:hover{background:#FEF3D0!important}

.medal{position:absolute;top:9px;right:11px;font-size:1.1rem;line-height:1;filter:drop-shadow(0 1px 3px rgba(0,0,0,.18));z-index:2}
/* ── fichas de etapas globales ── */
.stage-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:14px}
.stage-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;box-shadow:var(--sh);position:relative;overflow:hidden}
.stage-card .sc-top{width:100%;height:3px;border-radius:99px;position:absolute;top:0;left:0}
.stage-card .sc-name{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;line-height:1.3;min-height:2.1em}
.stage-card .sc-val{font-size:1.7rem;font-weight:800;line-height:1;margin-top:8px;font-variant-numeric:tabular-nums}
.stage-card .sc-pct{font-size:.74rem;color:var(--faint);font-weight:600;margin-top:5px}
.stage-card .sc-bar{height:5px;background:var(--line-2);border-radius:99px;overflow:hidden;margin-top:9px}
.stage-card .sc-bar i{display:block;height:100%;border-radius:99px}
/* ── barra de origen manual vs auto ── */
.origin-split{display:flex;height:46px;border-radius:10px;overflow:hidden;border:1px solid var(--line);font-weight:800;font-size:.84rem}
.origin-split .os{display:flex;align-items:center;justify-content:center;gap:8px;color:#fff;transition:flex .5s ease;min-width:62px;white-space:nowrap}
.os-manual{background:var(--green)}.os-auto{background:var(--ink-3)}
.origin-legend{display:flex;gap:18px;margin-top:11px;flex-wrap:wrap}
.origin-legend .ol{display:flex;align-items:center;gap:7px;font-size:.78rem;color:var(--muted);font-weight:600}

.bk-search:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-bg)}
.tbl th[data-sk]{cursor:pointer;user-select:none;white-space:nowrap}

@keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(220,64,70,.75)}60%{box-shadow:0 0 0 5px rgba(220,64,70,0)}}
.st-red{animation:pulseRed 1.8s ease-in-out infinite}

.kpi-tip{position:relative;display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:var(--line-2);color:var(--faint);font-size:.6rem;font-weight:800;cursor:pointer;flex-shrink:0;vertical-align:middle;margin-left:4px}

.tbl thead th{position:sticky;top:0;z-index:2;background:var(--card)}

.gs-wrap{position:relative}

.gs-results{position:absolute;top:calc(100% + 5px);left:0;min-width:260px;background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:var(--sh-lg);z-index:50;max-height:280px;overflow-y:auto;display:none}

.gs-item{padding:9px 14px;cursor:pointer;font-size:.82rem;border-bottom:1px solid var(--line-2);transition:background .1s}
.gs-item:last-child{border-bottom:none}
.gs-item:hover{background:var(--hover)}
.gs-tag{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);margin-right:5px;vertical-align:middle}

/* ── dark mode row highlights ── */

.meta-prog-bar i{display:block;height:100%;border-radius:99px;transition:width .6s ease}
/* ── 1. entrada escalonada tarjetas ── */
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.team-grid .tcard{animation:cardIn .38s ease-out both}
/* ── 2. hover escala KPI y stage-card ── */
.kpi{transition:transform .18s ease,box-shadow .18s ease}

/* ---------- BRANCHES (roll-up por sucursal, derivado de TEAM) ---------- */
function branchData(){
  const map={};
  TEAM.forEach(v=>{
    const b = map[v.sucursal] || (map[v.sucursal]={sucursal:v.sucursal, leads:0, prevLeads:0, cierres:0, value:0, backlog:0, vends:[]});
    b.leads+=v.leads; b.prevLeads+=v.prevLeads; b.cierres+=v.cierres; b.value+=v.value; b.backlog+=v.backlog; b.vends.push(v);
  });
  return Object.values(map).sort((a,b)=>b.cierres-a.cierres);
}

/* ---------- ALERTAS (generadas de los datos reales) ---------- */
function buildAlerts(){
  const A=[];
  const fn=v=>(v.name||'').split(' - ')[0];
  const worstBk=[...TEAM].sort((a,b)=>(b.backlog||0)-(a.backlog||0))[0];
  if(worstBk && worstBk.backlog>0){
    const pct=worstBk.leads?Math.round(worstBk.backlog/worstBk.leads*100):0;
    A.push({sev:'red', who:fn(worstBk), t:`${worstBk.backlog} deals sin seguimiento (${pct}% de sus leads)`, d:`Es el mayor foco de backlog del equipo. Califica al ${worstBk.califPct}% pero no da seguimiento. Acción: plan de contacto diario + revisión de cola.`, act:'Exigir seguimiento'});
  }
  const worstNunca=[...TEAM].sort((a,b)=>(b.nunca||0)-(a.nunca||0))[0];
  if(worstNunca && worstNunca.nunca>10){
    A.push({sev:'red', who:fn(worstNunca), t:`${worstNunca.nunca} leads nunca tocados`, d:'El bot los movió y nunca hubo acción humana. Riesgo de pérdida directa. Acción: repartir y contactar en 48h.', act:'Repartir cola'});
  }
  const slow=[...TEAM].filter(v=>!v.nuevo).sort((a,b)=>(a.u24||0)-(b.u24||0))[0];
  if(slow){
    A.push({sev:'red', who:fn(slow), t:`Solo ${slow.u24}% actualiza el CRM en <24h`, d:`${slow.backlog} deals sin seguimiento y de las más lentas en reflejar actividad (${slow.promTxt} prom). Acción: coaching de disciplina CRM.`, act:'Coaching CRM'});
  }
  const late=[...TEAM].sort((a,b)=>(b.tarde||0)-(a.tarde||0))[0];
  if(late && late.tarde>150){
    A.push({sev:'amber', who:fn(late), t:`${late.tarde} actualizaciones tardías (+72h)`, d:`Registra tarde en Kommo (${late.cierres} cierres). Si ordena su registro, el dato del equipo mejora. Acción: hábito de registro inmediato.`, act:'Registro al momento'});
  }
  if(TOP_CONC_PCT>=30){
    A.push({sev:'amber', who:'Gerencia', t:`Concentración: ${TOP_VENDOR_NAME} = ${TOP_CONC_PCT}% de los cierres`, d:'Dependencia estructural alta de una sola vendedora. Acción: documentar y replicar su playbook al resto.', act:'Replicar playbook'});
  }
  const noResp=[...TEAM].sort((a,b)=>(b.noRespPct||0)-(a.noRespPct||0))[0];
  if(noResp && noResp.noRespPct>=70){
    A.push({sev:'amber', who:fn(noResp), t:`${noResp.noRespPct}% de sus leads en "No responden"`, d:`${noResp.noResp} leads sin respuesta del cliente. Problema de reactivación. Acción: segunda cadencia de contacto (WhatsApp + llamada).`, act:'Reactivar'});
  }
  A.push({sev:'red', who:'Datos / Gerencia', t:`${QUALITY.sinSucursalPct}% de los leads sin sucursal etiquetada`, d:`${QUALITY.sinSucursal.toLocaleString('es')} fichas sin sucursal — imposible medir bien por tienda. Acción: campaña de etiquetado.`, act:'Etiquetar'});
  A.push({sev:'red', who:'Datos / Gerencia', t:'Deals abiertos sin valor cargado (~100%)', d:'No se puede priorizar el pipeline por monto. Acción: cargar valor estimado al cotizar.', act:'Cargar valor'});
  if(LEADS_MOM_PCT<0){
    A.push({sev:'amber', who:'Gerencia', t:`Leads globales ${LEADS_MOM_PCT}% vs ${PREV_MONTH_LBL} (${GLOBAL.leads.toLocaleString('es')} vs ${(GLOBAL.prevLeads||0).toLocaleString('es')})`, d:'Caída de captación en todos los canales. El cuello de botella sigue siendo conversión, pero vigilar la entrada.', act:'Vigilar captación'});
  }
  const nuevo=TEAM.find(v=>v.nuevo);
  if(nuevo){
    A.push({sev:'green', who:fn(nuevo), t:`Nuevo — ${nuevo.leads} leads asignados, en rampa`, d:`Buena disciplina inicial (${nuevo.u24}% <24h). Acción: acompañar primeras cotizaciones para acelerar su primer cierre.`, act:'Acompañar'});
  }
  return A;
}

  return `

    <tbody>${branches.map(b=>`<tr style="cursor:pointer" onclick="openSucursal('${b.sucursal}')">

      <td class="r num">${b.leads.toLocaleString('en-US')}</td>
      <td class="r">${momBadge(b.leads,b.prevLeads)}</td>
      <td class="r num bold">${b.cierres}</td>
      <td class="r num">${(b.cierres/b.leads*100).toFixed(1)}%</td>
      <td class="r num">${fmtMoney(b.value)}</td>
      <td class="r num" style="${b.backlog>100?'color:var(--red-ink);font-weight:800':''}">${b.backlog}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

/* ---------- PERFIL VENDEDORA (drill-down) ---------- */
function embudoHTML(name){
  const order=['Nueva consulta','Interesado','Cotización enviada','Agendado / Visita','Compradores','No Responden'];
  const colMap={'Compradores':'var(--green)','No Responden':'var(--faint)','Cotización enviada':'var(--brand)','Agendado / Visita':'var(--blue)'};
  const st=STAGES_BY_V[name]||[];
  const m={}; st.forEach(s=>m[s.s]=s.c);
  const max=Math.max(1,...order.map(o=>m[o]||0));
  return order.filter(o=>m[o]!==undefined).map(o=>{
    const c=m[o]||0, w=Math.max(6,c/max*100);
    return `<div class="fstep" style="grid-template-columns:135px 1fr 50px"><div class="fn" style="font-size:.76rem">${o}</div>
      <div class="fbar" style="width:${w}%;background:${colMap[o]||'var(--ink-3)'};height:28px;font-size:.76rem">${c}</div>
      <div class="fp">${c}</div></div>`;
  }).join('');
}

/* ============================================================
   VISTA SEMANAL — clientes cerrados y $ ingresado por semana
   (distribución representativa de los totales reales del mes;
    en producción generar.py lo calcula con fechas de cierre)
   ============================================================ */
const SEM = (typeof window!=='undefined' && window.DASH && window.DASH.weekly) ? window.DASH.weekly : {
  curMonth:'Mayo', prevMonth:'Abril',
  curWeeks:[['S1','1–7'],['S2','8–14'],['S3','15–21'],['S4','22–28'],['S5','29–31']],
  prevWeeks:[['S1','1–7'],['S2','8–14'],['S3','15–21'],['S4','22–28'],['S5','29–30']],
};
let semMetric='clientes'; // 'clientes' | 'monto'
const CUR_W=[0.18,0.22,0.23,0.25,0.12];
const PREV_W=[0.21,0.23,0.22,0.20,0.14];
function _seed(name){ let s=0; for(const c of name) s=(s*31+c.charCodeAt(0))%99991; return s||7; }
function _jit(base, seed){ let s=seed; const r=()=>{s=(s*9301+49297)%233280;return s/233280;}; const w=base.map(x=>x*(0.8+r()*0.4)); const sum=w.reduce((a,b)=>a+b,0); return w.map(x=>x/sum); }
function _splitInt(total,w){ const raw=w.map(x=>x*total),fl=raw.map(Math.floor); let rem=total-fl.reduce((a,b)=>a+b,0); const fr=raw.map((x,i)=>({i,f:x-fl[i]})).sort((a,b)=>b.f-a.f); for(let k=0;k<rem;k++) fl[fr[k%fr.length].i]++; return fl; }
function _splitMoney(total,w){ const r=w.map(x=>Math.round(x*total)); r[r.length-1]+=total-r.reduce((a,b)=>a+b,0); return r; }
function weeklyFor(v){
  // PRODUCCIÓN: si generar.py inyectó el detalle semanal real por vendedora, úsalo.
  if(SEM.byVendor && SEM.byVendor[v.name]){
    const b=SEM.byVendor[v.name];
    return {
      cur:{ cierres:b.curC, monto:b.curM, totC:b.curC.reduce((a,c)=>a+c,0), totM:b.curM.reduce((a,c)=>a+c,0) },
      prev:{ cierres:b.prevC, monto:b.prevM, totC:b.prevC.reduce((a,c)=>a+c,0), totM:b.prevM.reduce((a,c)=>a+c,0) },
    };
  }
  // PREVIEW: reparte los totales reales del mes en semanas (representativo).
  const seed=_seed(v.name);
  const factor = v.prevLeads? v.prevLeads/v.leads : 0;
  const prevCierres=Math.round(v.cierres*factor), prevValue=Math.round(v.value*factor);
  const nCur = SEM.curWeeks.length, nPrev = SEM.prevWeeks.length;
  const curW = CUR_W.slice(0,nCur), prevW = PREV_W.slice(0,nPrev);
  return {
    cur:{ cierres:_splitInt(v.cierres,_jit(curW,seed)), monto:_splitMoney(v.value,_jit(curW,seed+1)), totC:v.cierres, totM:v.value },
    prev:{ cierres:_splitInt(prevCierres,_jit(prevW,seed+2)), monto:_splitMoney(prevValue,_jit(prevW,seed+3)), totC:prevCierres, totM:prevValue },
  };
}
function setSemMetric(m){ semMetric=m; renderSemanal(); }
function vSemanal(){
  return `
  <div class="section-head">
    <div><div class="eyebrow">Ritmo semanal</div><h2>Cierres y ventas por semana &mdash; ${SEM.curMonth} vs ${SEM.prevMonth}</h2>
    <p>Cómo avanza cada vendedora semana a semana. Cambia entre clientes cerrados y monto ingresado.</p></div>
    <div class="seg" id="semToggle">
      <button class="seg-btn" data-m="clientes">Clientes cerrados</button>
      <button class="seg-btn" data-m="monto">Monto ingresado</button>
    </div>
  </div>
  <div class="card pad"><div class="eyebrow" style="margin-bottom:12px" id="semChartTitle"></div><div id="semChart"></div></div>

  <div class="section-head"><div><div class="eyebrow">Detalle</div><h2>Por vendedora y semana</h2></div>
  <span class="tag-line" id="semTblNote"></span></div>
  <div class="card" style="overflow-x:auto"><table class="tbl" id="semTable"></table></div>
  <div class="tag-line" style="padding:0 2px"><b>Cerrado Mayo</b> = monto de deals que llegaron a etapa Compradores este mes. <b>Pipeline total</b> = valor de todos los deals en todas las etapas (= Resumen). La diferencia por vendedora representa deals aún en proceso que no han cerrado.</div>`;
}
function renderSemanal(){
  // toggle active
  document.querySelectorAll('#semToggle .seg-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.m===semMetric);
    b.onclick=()=>setSemMetric(b.dataset.m);
  });
  const isC = semMetric==='clientes';
  const weeks = SEM.curWeeks;
  const data = TEAM.map(v=>({v, w:weeklyFor(v)}));
  const fmtCell = n => isC ? (n||0) : fmtK(n);
  // team weekly totals
  const curTot = weeks.map((_,i)=> data.reduce((s,d)=> s + (isC? d.w.cur.cierres[i]: d.w.cur.monto[i]),0));
  const prevTot= weeks.map((_,i)=> data.reduce((s,d)=> s + (isC? d.w.prev.cierres[i]: d.w.prev.monto[i]),0));
  const mx=Math.max(1,...curTot,...prevTot);
  // chart
  const ct=document.getElementById('semChartTitle'); if(ct) ct.textContent = (isC?'Clientes cerrados':'Monto ingresado')+' por semana — equipo completo';
  const ch=document.getElementById('semChart');
  if(ch) ch.innerHTML = `<div class="wk-chart">${weeks.map((wk,i)=>`
      <div class="wk-col">
        <div class="wk-bars">
          <div class="wk-bar" style="height:${prevTot[i]/mx*100}%;background:var(--faint)" title="${SEM.prevMonth}: ${isC?prevTot[i]:fmtMoney(prevTot[i])}"></div>
          <div class="wk-bar" style="height:${curTot[i]/mx*100}%;background:var(--brand)" title="${SEM.curMonth}: ${isC?curTot[i]:fmtMoney(curTot[i])}"></div>
        </div>
        <div class="wk-val">${fmtCell(curTot[i])}</div>
        <div class="wk-lbl">${wk[0]}<br><span class="where">${wk[1]}</span></div>
      </div>`).join('')}</div>
    <div class="tag-line" style="display:flex;gap:16px;margin-top:10px"><span><span class="lg" style="background:var(--faint)"></span> ${SEM.prevMonth}</span><span><span class="lg" style="background:var(--brand)"></span> ${SEM.curMonth}</span></div>`;
  // table
  const tb=document.getElementById('semTable');
  const note=document.getElementById('semTblNote'); if(note) note.textContent = isC? 'Clientes cerrados por semana':'Monto cerrado por semana ($) — solo deals en etapa Compradores';
  if(tb){
    const totalLabel = isC ? `Total ${SEM.curMonth}` : `Cerrado ${SEM.curMonth}`;
    const head = `<thead><tr><th>Vendedora</th>${weeks.map(w=>`<th class="r">${w[0]}<br><span class="where" style="font-weight:500">${w[1]}</span></th>`).join('')}<th class="r">${totalLabel}</th><th class="r">vs ${SEM.prevMonth}</th>${!isC?'<th class="r" style="color:var(--muted);font-size:.7rem">Pipeline<br>total</th>':''}</tr></thead>`;
    const rows = data.sort((a,b)=> (isC? b.w.cur.totC-a.w.cur.totC : b.w.cur.totM-a.w.cur.totM)).map(d=>{
      const arr = isC? d.w.cur.cierres : d.w.cur.monto;
      const tot = isC? d.w.cur.totC : d.w.cur.totM;
      const ptot= isC? d.w.prev.totC: d.w.prev.totM;
      const rowMx=Math.max(1,...arr);
      const pipeCol = !isC ? `<td class="r num" style="color:var(--muted);font-size:.8rem">${fmtMoney(d.v.value)}</td>` : '';
      return `<tr>
        <td><div class="who">${d.v.name}</div><div class="where">${d.v.sucursal}</div></td>
        ${arr.map(n=>`<td class="r"><div class="num" style="font-weight:600">${fmtCell(n)}</div><div class="mbar" style="height:4px;margin-top:3px"><i style="width:${n/rowMx*100}%;background:var(--brand)"></i></div></td>`).join('')}
        <td class="r num bold">${isC?tot:fmtMoney(tot)}</td>
        <td class="r">${ptot?momBadge(tot,ptot):'<span class="delta up">nuevo</span>'}</td>
        ${pipeCol}
      </tr>`;
    }).join('');
    const tC=data.reduce((s,d)=>s+(isC?d.w.cur.totC:d.w.cur.totM),0);
    const tP=data.reduce((s,d)=>s+(isC?d.w.prev.totC:d.w.prev.totM),0);
    const tPipe=data.reduce((s,d)=>s+d.v.value,0);
    const pipeEquipoCol = !isC ? `<td class="r num bold" style="color:var(--muted)">${fmtMoney(tPipe)}</td>` : '';
    const totRow=`<tr style="background:var(--hover)"><td class="bold">Equipo</td>${curTot.map(n=>`<td class="r num bold">${fmtCell(n)}</td>`).join('')}<td class="r num bold">${isC?tC:fmtMoney(tC)}</td><td class="r">${momBadge(tC,tP)}</td>${pipeEquipoCol}</tr>`;
    tb.innerHTML = head+`<tbody>${rows}${totRow}</tbody>`;
  }
}

<script>

const fmtMoney = n => '$' + Math.round(n).toLocaleString('en-US');
const fmtK = n => '$' + (n/1000).toFixed(0) + 'K';

// ── PUENTE DE PRODUCCIÓN ───────────────────────────────────────────────
// generar.py inyecta window.DASH con los datos reales del mes (ver port/INTEGRATION.md).
// Si no existe (modo preview), se usan los valores de ejemplo de Mayo 2026 de abajo.
const DASH = (typeof window!=='undefined' && window.DASH) ? window.DASH : null;

// DATOS REALES Mayo 2026 (extraídos del index.html generado por generar.py / Kommo)
// disciplina CRM (velocidad) + rendimiento comercial (cierres/conv/ticket/pipeline/calif/no-resp) + backlog

let bkFilter='all', bkVend=null, bkStage=null, bkMode='backlog', bkSearch='', bkSort={k:'d',dir:-1};
function bkSavePref(){try{localStorage.setItem('bk_pref',JSON.stringify({f:bkFilter,v:bkVend,m:bkMode,st:bkStage}));}catch(e){}}
function bkLoadPref(){
  try{
    const p=JSON.parse(localStorage.getItem('bk_pref')||'null');
    if(!p)return;
    if(p.m==='stage') setBkMode('stage',p.st||null);
    if(p.f&&p.f!=='all'){bkFilter=p.f;document.querySelectorAll('[data-f]').forEach(b=>b.classList.toggle('active',b.dataset.f===p.f));}
    if(p.v){bkVend=p.v;document.querySelectorAll('[data-v]').forEach(b=>b.classList.toggle('active',b.dataset.v===p.v));}
    renderBacklog();
  }catch(e){}
}
function bkSetSearch(v){ bkSearch=(v||'').trim().toLowerCase(); renderBacklog(); }
function bkSortBy(k){ if(bkSort.k===k){bkSort.dir*=-1;} else {bkSort={k,dir:(k==='d'||k==='v')?-1:1};} renderBacklog(); }
function bkApply(rows){
  let r=rows;
  if(bkSearch){ r=r.filter(x=>((x.c||'')+' '+(x.r||'')+' '+(x.e||'')+' '+(x.s||'')).toLowerCase().includes(bkSearch)); }
  const k=bkSort.k, dir=bkSort.dir, txt=(k==='c'||k==='e'||k==='s'||k==='r');
  r=[...r].sort((a,b)=>{ let av=a[k],bv=b[k]; if(txt) return dir*String(av||'').localeCompare(String(bv||'')); return dir*(((av||0)>(bv||0))?1:((av||0)<(bv||0))?-1:0); });
  return r;
}
function bkTh(k,label,right){ const a=bkSort.k===k; return `<th class="${right?'r':''}" data-sk="${k}">${label}${a?` <span style="font-size:.72em">${bkSort.dir>0?'▲':'▼'}</span>`:''}</th>`; }
function bkBindSort(t){ t.querySelectorAll('th[data-sk]').forEach(th=>th.onclick=()=>bkSortBy(th.dataset.sk)); }
let STAGE_LEADS = (window.DASH && window.DASH.stage_leads) || [];
function renderBacklogBy(){
  const el=document.getElementById('backlogBy'); if(!el)return;
  const max=Math.max(...BACKLOG_BY.map(b=>b.n));
  el.innerHTML = BACKLOG_BY.map(b=>{
    const col=b.status==='green'?'var(--green)':b.status==='amber'?'var(--amber)':'var(--red)';
    return `<div style="display:grid;grid-template-columns:150px 1fr 120px;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid var(--line-2)">
      <div class="who">${b.name}</div>
      <div class="mbar" style="height:11px"><i style="width:${b.n/max*100}%;background:${col}"></i></div>
      <div style="text-align:right"><b class="num" style="font-size:1.05rem;color:${col}">${b.n}</b> <span class="where">(${b.pct}% de sus leads)</span></div>
    </div>`;
  }).join('');
}
function leadId(r){ return r.id || ((r.c||'').match(/^Lead #(\d+)$/)||[])[1] || ''; }
function renderBacklog(){
  const t=document.getElementById('bkTable'); if(!t)return;
  bkSavePref();
  if(bkMode==='stage'){
    let rows=STAGE_LEADS;
    if(bkVend) rows=rows.filter(r=>r.r===bkVend);
    if(bkStage) rows=rows.filter(r=>r.e===bkStage);
    rows=bkApply(rows);
    const note=document.getElementById('bkNote');
    if(note) note.textContent=`${rows.length} leads ${bkVend||bkStage||bkSearch?'con este filtro (de '+STAGE_LEADS.length+' en el pipeline)':'en el pipeline activo'}.`;
    const body=rows.map(r=>{
      const id=leadId(r);
      const url=id?`https://eanez.kommo.com/leads/detail/${id}`:'';
      return `<tr style="${url?'cursor:pointer':''}" ${url?`onclick="window.open('${url}','_blank')"`:''}>
      <td><span class="mono" style="font-size:.78rem">${url?`<a href="${url}" target="_blank" style="color:inherit;text-decoration:none" onclick="event.stopPropagation()">${r.c}</a>`:r.c}</span></td>
      <td><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${STAGE_COLORS[r.e]||'var(--muted)'};margin-right:5px;vertical-align:middle"></span>${r.e}</td>
      <td class="where" style="color:var(--muted)">${r.s}</td>
      <td>${r.r}</td>
      <td class="r">${r.v?fmtMoney(r.v):'—'}</td>
      <td class="r"><span class="st st-amber"><span class="d"></span>${r.d} d</span></td>
    </tr>`;}).join('');
    t.innerHTML=`<thead><tr>${bkTh('c','Contacto / Deal',false)}${bkTh('e','Etapa',false)}${bkTh('s','Sucursal',false)}${bkTh('r','Responsable',false)}${bkTh('v','Valor',true)}${bkTh('d','Días',true)}</tr></thead><tbody>${body||'<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--muted)">Sin fichas con este filtro</td></tr>'}</tbody>`;
    bkBindSort(t);
    return;
  }
  let rows=BACKLOG;
  if(bkFilter==='crit') rows=rows.filter(r=>r.d>=7);
  if(bkFilter==='nh') rows=rows.filter(r=>r.nh);
  if(bkVend) rows=rows.filter(r=>r.r===bkVend);
  if(bkStage) rows=rows.filter(r=>r.e===bkStage);
  rows=bkApply(rows);
  const filtered = bkFilter!=='all' || bkVend || bkStage || bkSearch;
  const display = filtered ? rows : rows.slice(0,50);
  const note=document.getElementById('bkNote');
  if(note) note.textContent = filtered
    ? `${display.length} fichas que coinciden con el filtro (de ${TOTAL_BACKLOG} en backlog).`
    : `Mostrando las ${display.length} fichas más antiguas de ${TOTAL_BACKLOG} en backlog. En Kommo muchos contactos no tienen nombre cargado — aparecen como "Lead #".`;
  const body=display.map(r=>{
    const danger=r.d>=7;
    const id=leadId(r);
    const url=id?`https://eanez.kommo.com/leads/detail/${id}`:'';
    return `<tr class="${danger?'bk-crit':r.d>=3?'bk-warn':''}" style="${url?'cursor:pointer':''}" ${url?`onclick="window.open('${url}','_blank')"`:''}>
      <td><span class="mono" style="font-size:.78rem">${url?`<a href="${url}" target="_blank" style="color:inherit;text-decoration:none" onclick="event.stopPropagation()">${r.c}</a>`:r.c}</span>${r.nh?' <span class="st st-amber" style="font-size:.62rem;padding:1px 7px">🔍 nunca tocado</span>':''}</td>
      <td>${r.e}</td>
      <td class="where" style="color:var(--muted)">${r.s}</td>
      <td>${r.r}</td>
      <td class="r"><span class="st ${danger?'st-red':'st-amber'}"><span class="d"></span>${r.d} d</span></td>
    </tr>`;}).join('');
  t.innerHTML=`<thead><tr>${bkTh('c','Contacto / Deal',false)}${bkTh('e','Etapa',false)}${bkTh('s','Sucursal',false)}${bkTh('r','Responsable',false)}${bkTh('d','Días sin act.',true)}</tr></thead><tbody>${body||'<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--muted)">Sin fichas con este filtro</td></tr>'}</tbody>`;
  bkBindSort(t);
}

function setBkMode(mode, initialStage){
  bkMode=mode; bkStage=initialStage||null; bkSort={k:'d',dir:-1};
  document.querySelectorAll('[data-m]').forEach(b=>b.classList.toggle('active',b.dataset.m===mode));
  const bkF=document.getElementById('bkFilters');
  if(bkF) bkF.querySelectorAll('[data-f],[data-v]').forEach(b=>b.style.display=mode==='stage'?'none':'');
  const title=document.getElementById('bkSectionTitle');
  if(title) title.textContent=mode==='stage'?'Todos los leads activos — filtrar por etapa':'Cola priorizada — más antiguas primero';
  const sf=document.getElementById('bkStageFilters');
  if(sf){
    const source=mode==='stage'?STAGE_LEADS:BACKLOG;
    const ord=STAGE_ORDER.filter(s=>source.some(r=>r.e===s));
    sf.innerHTML=ord.map(s=>`<button class="chipf${bkStage===s?' active':''}" data-e="${s}"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${STAGE_COLORS[s]||'var(--muted)'};margin-right:4px;vertical-align:middle;flex-shrink:0"></span>${s}</button>`).join('');
    sf.querySelectorAll('[data-e]').forEach(b=>b.onclick=()=>{
      if(bkStage===b.dataset.e){bkStage=null;b.classList.remove('active');}
      else{sf.querySelectorAll('[data-e]').forEach(x=>x.classList.remove('active'));b.classList.add('active');bkStage=b.dataset.e;}
      renderBacklog();
    });
  }
  renderBacklog();
}

}

/* ── contadores animados ── */
function countUp(el,dur=540){
  const orig=el.textContent;
  const m=orig.match(/^([^0-9]*)(\d[\d,.]*)(.*)/);
  if(!m) return;
  const num=parseFloat(m[2].replace(/,/g,''));
  if(!num||num<=0) return;
  const t0=performance.now();
  (function step(ts){
    const p=Math.min((ts-t0)/dur,1), ease=1-Math.pow(1-p,3), v=num*ease;
    const d=num>=1000?Math.round(v).toLocaleString('en-US'):num>=10?String(Math.round(v)):v.toFixed(1);
    el.textContent=m[1]+d+m[3];
    if(p<1)requestAnimationFrame(step); else el.textContent=orig;
  })(performance.now());
}
function runCountUps(){requestAnimationFrame(()=>document.querySelectorAll('.kpi-val,.diag-stat .v').forEach(el=>countUp(el)));}

async function triggerWorkflow(){
  const btn=document.getElementById('btnActualizar');
  const svgIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v5h-5"/></svg>';
  const setBtn=(txt,disabled)=>{if(btn){btn.disabled=!!disabled;btn.innerHTML=txt;}};
  let tok=localStorage.getItem('gh_wf_pat');
  if(!tok){
    tok=prompt('Para actualizar desde el dashboard necesitas un token de GitHub.\n\nCrea uno en:\ngithub.com → Settings → Developer settings\n→ Personal access tokens → Fine-grained tokens\n→ Solo permiso "Actions: Read and write" para el repo MULTIESPUMAS\n\nPega el token aquí:');
    if(!tok)return;
    localStorage.setItem('gh_wf_pat',tok.trim());
  }
  setBtn(svgIcon.replace('><path','><path class="spin"')+' Iniciando...',true);
  try{
    const r=await fetch('https://api.github.com/repos/eduardoxyz22-maker/MULTIESPUMAS/actions/workflows/update-crm-dashboard.yml/dispatches',{
      method:'POST',
      headers:{'Authorization':'Bearer '+tok.trim(),'Accept':'application/vnd.github+json','Content-Type':'application/json','X-GitHub-Api-Version':'2022-11-28'},
      body:JSON.stringify({ref:'main'})
    });
    if(r.status===204){
      setBtn('✓ Actualizando (~2 min)...',true);
      setTimeout(()=>location.reload(),110000);
    } else if(r.status===401||r.status===403){
      localStorage.removeItem('gh_wf_pat');
      setBtn(svgIcon+' Token inválido — toca de nuevo',false);
      setTimeout(()=>setBtn(svgIcon+' Actualizar',false),3000);
    } else {
      setBtn(svgIcon+' Error '+r.status,false);
      setTimeout(()=>setBtn(svgIcon+' Actualizar',false),3000);
    }
  }catch(e){
    setBtn(svgIcon+' Sin conexión',false);
    setTimeout(()=>setBtn(svgIcon+' Actualizar',false),3000);
  }
}
function _csvDownload(filename, rows){
  const csv = rows.map(r=>r.map(c=>{
    const s = String(c==null?'':c);
    return s.includes(',') || s.includes('"') || s.includes('\n') ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(',')).join('\r\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

function exportarCSV(){
  const mes = (DASH&&DASH.month?DASH.month:'')+(DASH&&DASH.year?'_'+DASH.year:'');
  const header = ['Vendedora','Sucursal','Leads','Leads Mes Ant.','Cierres','Conv %','Pipeline $','Ticket Prom $','% Leads < 24h','Prom Resp','Backlog','No Responden','Estado'];
  const rows = [header, ...TEAM.map(v=>[
    (v.name||'').split(' - ')[0],
    v.sucursal||'—',
    v.leads||0,
    v.prevLeads||0,
    v.cierres||0,
    (v.conv||0)+'%',
    v.value||0,

    (v.u24||0)+'%',
    v.promTxt||'—',
    v.backlog||0,
    v.noResp||0,
    v.status||'—',
  ])];
  rows.push([]);

}

function exportarBacklog(){
  const mes = (DASH&&DASH.month?DASH.month:'')+(DASH&&DASH.year?'_'+DASH.year:'');
  if(bkMode==='stage'){
    let rows=STAGE_LEADS;
    if(bkVend) rows=rows.filter(r=>r.r===bkVend);
    if(bkStage) rows=rows.filter(r=>r.e===bkStage);
    rows=bkApply(rows);
    const header=['Contacto','Etapa','Sucursal','Responsable','Valor','Días','Link Kommo'];
    const out=[header, ...rows.map(b=>{ const id=leadId(b); return [
      b.c||'—', b.e||'—', b.s||'—', b.r||'—', b.v||0, b.d||0, id?'https://eanez.kommo.com/leads/detail/'+id:''
    ];})];
    _csvDownload('pipeline_por_etapa'+(mes?'_'+mes:'')+'.csv', out);
    return;
  }
  let rows=BACKLOG;
  if(bkFilter==='crit') rows=rows.filter(r=>r.d>=7);
  if(bkFilter==='nh') rows=rows.filter(r=>r.nh);
  if(bkVend) rows=rows.filter(r=>r.r===bkVend);
  if(bkStage) rows=rows.filter(r=>r.e===bkStage);
  rows=bkApply(rows);
  const header = ['Contacto','Etapa','Sucursal','Responsable','Días sin contacto','Sin acción humana','Link Kommo'];
  const out = [header, ...rows.map(b=>{ const id=leadId(b); return [
    b.c||'—', b.e||'—', b.s||'—', b.r||'—', b.d||0, b.nh?'Sí':'No', id?'https://eanez.kommo.com/leads/detail/'+id:''
  ];})];
  _csvDownload('backlog_seguimiento'+(mes?'_'+mes:'')+'.csv', out);
}

function applyTheme(t){
  const dark=t==='dark';
  document.documentElement.setAttribute('data-theme', dark?'dark':'light');
  try{localStorage.setItem('dash_theme', dark?'dark':'light');}catch(e){}
  const btn=document.getElementById('btnTheme');
  if(btn){ btn.innerHTML = dark?_SUN:_MOON; btn.title = dark?'Cambiar a tema claro':'Cambiar a tema oscuro'; }
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')==='dark'?'dark':'light';
  applyTheme(cur==='dark'?'light':'dark');
}
applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'dark':'light');
