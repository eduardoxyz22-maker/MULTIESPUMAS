<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Heaven Colchones · Panel Comercial — Junio 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
/* Heaven panel — unified themeable styles. v3
   LIGHT theme = Direction A (Refinado). DARK theme = Direction B (Command Center).
   Toggle sets data-theme on <html>. Tokens flip; a few dark-only rules add
   the neon glow, mono numerals and grid texture that define the B aesthetic. */

@import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#F5F7F8; --card:#FFFFFF; --card2:#FFFFFF; --ink:#0F1620;
  --line:#E7EAEE; --line2:#F0F2F4; --text:#16202C; --muted:#697483; --faint:#9BA4B0;
  --brand:#00B5AD; --brand-d:#0A7D77; --brand-ink:#04302E; --brand-bg:#E0F4F2;
  --green:#159A57; --green-bg:#E7F5ED; --green-ink:#0C5C34;
  --amber:#D98300; --amber-bg:#FBF0DA; --amber-ink:#7A4A00; --amber-border:rgba(217,131,0,.3);
  --red:#DC4046; --red-bg:#FBE8E9; --red-ink:#871F23; --red-border:rgba(220,64,70,.3);
  --blue:#2E6FE0; --purple:#7A5AF0;
  --rail:#0F1620; --rail-tx:#A7B1BD; --rail-line:rgba(255,255,255,.07);
  --mono:'IBM Plex Mono',monospace; --num-ff:'Hanken Grotesk',sans-serif;
  --r:14px; --r-sm:9px; --r-lg:18px;
  --sh:0 1px 2px rgba(15,22,32,.04),0 4px 16px rgba(15,22,32,.05);
  --glow:none; --grid:none;
  --kpi-num-w:800; --eb-ff:'Hanken Grotesk',sans-serif;
  color-scheme:light;
}
html[data-theme="dark"]{
  --bg:#0A0E13; --card:#12181F; --card2:#161D26; --ink:#0A0E13;
  --line:#232C37; --line2:rgba(35,44,55,.6); --text:#E6EAEF; --muted:#8B97A4; --faint:#5E6975;
  --brand:#16C8BF; --brand-d:#16C8BF; --brand-ink:#04302E; --brand-bg:rgba(22,200,191,.1);
  --green:#2BB56E; --green-bg:rgba(43,181,110,.14); --green-ink:#4FE0A8;
  --amber:#E89A1C; --amber-bg:rgba(232,154,28,.14); --amber-ink:#F0C173; --amber-border:rgba(232,154,28,.35);
  --red:#E8585D; --red-bg:rgba(232,88,93,.14); --red-ink:#FF9A9D; --red-border:rgba(232,88,93,.35);
  --blue:#4A86F0; --purple:#8B7BF5;
  --rail:rgba(7,10,14,.7); --rail-tx:#9AA6B2; --rail-line:#232C37;
  --num-ff:'IBM Plex Mono',monospace; --kpi-num-w:600;
  --sh:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.35);
  --glow:0 0 16px rgba(22,200,191,.45); --eb-ff:'IBM Plex Mono',monospace;
  --grid:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
  color-scheme:dark;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
#root{display:flex;flex:1;min-height:100vh}
body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh;
  background-image:var(--grid);background-size:42px 42px;transition:background-color .3s,color .3s}
.num{font-family:var(--num-ff);font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.eb{font-size:.62rem;letter-spacing:1.6px;text-transform:uppercase;color:var(--faint);font-weight:700;font-family:var(--eb-ff)}
html[data-theme="dark"] .eb::before{content:"// "}

/* ===== RAIL ===== */
.rail{width:230px;flex-shrink:0;background:var(--rail);color:var(--rail-tx);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;border-right:1px solid var(--rail-line);backdrop-filter:blur(8px)}
.brand{padding:24px 22px 20px;border-bottom:1px solid var(--rail-line)}
.brand .h{font-size:1.32rem;font-weight:800;letter-spacing:2px;color:#fff}
.brand .h em{font-style:normal;color:var(--brand)}
html[data-theme="dark"] .brand .h em{text-shadow:0 0 14px rgba(22,200,191,.7)}
.brand .s{font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:#69737F;margin-top:5px;font-weight:700}
html[data-theme="dark"] .brand .s{font-family:var(--mono)}
.nav{padding:16px 12px;display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto}
.nl{font-size:.58rem;letter-spacing:1.5px;text-transform:uppercase;color:#5A6573;font-weight:700;padding:12px 12px 6px}
html[data-theme="dark"] .nl{font-family:var(--mono)}
.ni{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:var(--rail-tx);font-weight:600;font-size:.83rem;cursor:pointer;border:1px solid transparent;background:none;text-align:left;width:100%;font-family:inherit;transition:.15s}
.ni:hover{background:rgba(255,255,255,.05);color:#fff}
.ni.active{background:var(--brand);color:var(--brand-ink);box-shadow:0 4px 14px rgba(0,181,173,.28)}
html[data-theme="dark"] .ni.active{background:linear-gradient(90deg,rgba(22,200,191,.16),rgba(22,200,191,.04));color:var(--brand);border-color:rgba(22,200,191,.35);box-shadow:inset 0 0 18px rgba(22,200,191,.08)}
html[data-theme="dark"] .ni.active svg{filter:drop-shadow(0 0 6px rgba(22,200,191,.8))}
.ni .bdg{margin-left:auto;font-size:.63rem;font-weight:800;background:rgba(220,64,70,.92);color:#fff;border-radius:99px;padding:1px 7px;font-family:var(--num-ff)}
.ni.active .bdg{background:rgba(4,48,46,.25);color:var(--brand-ink)}
html[data-theme="dark"] .ni .bdg{background:rgba(232,88,93,.18);color:#FF9A9D;border:1px solid rgba(232,88,93,.4)}
.foot{padding:16px 20px;border-top:1px solid var(--rail-line);font-size:.63rem;color:#69737F;line-height:1.6}
html[data-theme="dark"] .foot{font-family:var(--mono)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:6px}
html[data-theme="dark"] .dot{box-shadow:0 0 8px var(--green)}

/* ===== MAIN ===== */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{background:var(--card);border-bottom:1px solid var(--line);padding:17px 30px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
html[data-theme="dark"] .top{background:rgba(10,14,19,.5);backdrop-filter:blur(10px)}
.crumb{font-size:.64rem;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:1.3px}
html[data-theme="dark"] .crumb{color:var(--brand);font-family:var(--mono)}
.top h1{font-size:1.18rem;font-weight:800;letter-spacing:-.3px;margin-top:2px}
.tr{display:flex;gap:10px;align-items:center}
.chip{font-size:.7rem;color:var(--muted);font-family:var(--mono);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:7px 11px}
.btn{font-weight:700;font-size:.76rem;border-radius:9px;padding:8px 13px;border:1px solid var(--line);background:var(--card);color:var(--text);display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-family:inherit;transition:.15s}
.btn:hover{border-color:var(--brand);color:var(--brand-d)}
.btn.pri{background:var(--ink);color:#fff;border-color:var(--ink)}
html[data-theme="dark"] .btn.pri{background:var(--brand);color:var(--brand-ink);border-color:var(--brand);box-shadow:0 0 18px rgba(22,200,191,.4)}
.btn.icon{padding:8px 10px}
.scroll{flex:1;overflow-y:auto;padding:26px 30px 50px;display:flex;flex-direction:column;gap:26px}
.view{display:flex;flex-direction:column;gap:26px}
@media (prefers-reduced-motion:no-preference){.view{animation:vin .25s ease-out}}
@keyframes vin{from{transform:translateY(8px)}to{transform:none}}

/* ===== SECTION HEAD ===== */
.sh{display:flex;align-items:flex-end;justify-content:space-between;gap:16px}
.sh h3{font-size:1.04rem;font-weight:800;letter-spacing:-.2px;margin-top:3px}
.sh p{font-size:.78rem;color:var(--muted);margin-top:3px;max-width:64ch}

/* ===== DIAGNOSTIC ===== */
.diag{background:linear-gradient(118deg,#0F1620,#26303E);color:#E8EDF2;border-radius:var(--r-lg);padding:28px 30px;display:grid;grid-template-columns:1.5fr 1fr;gap:30px;align-items:center;position:relative;overflow:hidden}
html[data-theme="dark"] .diag{background:linear-gradient(120deg,#0C1218,#10202A);border:1px solid var(--line)}
.diag::after{content:"";position:absolute;right:-70px;top:-70px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(0,181,173,.20),transparent 70%)}
html[data-theme="dark"] .diag::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--brand);box-shadow:0 0 22px var(--brand)}
.diag .tag{display:inline-flex;align-items:center;gap:7px;font-size:.62rem;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:#16C8BF;background:rgba(0,181,173,.13);border:1px solid rgba(0,181,173,.32);padding:5px 11px;border-radius:99px;margin-bottom:14px}
html[data-theme="dark"] .diag .tag{border-radius:6px;font-family:var(--mono)}
.diag h2{font-size:1.6rem;font-weight:800;line-height:1.24;letter-spacing:-.4px;color:#fff;text-wrap:balance}
.diag h2 em{font-style:normal;color:#16C8BF;background:linear-gradient(transparent 62%,rgba(0,181,173,.30) 62%)}
html[data-theme="dark"] .diag h2 em{background:none;text-shadow:0 0 18px rgba(22,200,191,.6)}
.diag p{font-size:.84rem;color:#9FAAB6;margin-top:12px;line-height:1.55}
.dstats{display:flex;gap:8px;position:relative;z-index:1}
.ds{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px}
.ds .v{font-size:1.4rem;font-weight:800;color:#fff;line-height:1;font-family:var(--num-ff)}
.ds .v.bad{color:#FF8A8E}.ds .v.good{color:#46D6A6}
.ds .l{font-size:.61rem;color:#8C97A4;margin-top:6px;font-weight:600;line-height:1.3}

/* ===== KPIs ===== */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;box-shadow:var(--sh);transition:transform .18s ease,box-shadow .18s ease}
.kpi:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(15,22,32,.10)}
html[data-theme="dark"] .kpi:hover{box-shadow:0 0 0 1px color-mix(in srgb,var(--kc) 40%,transparent),0 8px 22px rgba(0,0,0,.4)}
.kpi .ac{position:absolute;left:0;top:0;bottom:0;width:3px}
html[data-theme="dark"] .kpi .ac{top:0;bottom:auto;left:0;right:0;width:auto;height:2px;box-shadow:0 0 14px var(--kc)}
.ktop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kl{font-size:.66rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
html[data-theme="dark"] .kl{font-family:var(--mono);letter-spacing:1px}
.ki{width:30px;height:30px;border-radius:8px;display:grid;place-items:center}
.kv{font-size:1.8rem;font-weight:var(--kpi-num-w);line-height:1;letter-spacing:-.5px;font-family:var(--num-ff)}
.ksub{font-size:.72rem;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:6px}
.delta{font-weight:800;font-size:.7rem;padding:1px 7px;border-radius:6px;font-family:var(--num-ff)}
.delta.up{color:var(--green-ink);background:var(--green-bg)}.delta.down{color:var(--red-ink);background:var(--red-bg)}

/* ===== CARDS / GRID ===== */
.grid2{display:grid;grid-template-columns:1.05fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.card.tight{padding:0;overflow:hidden}

/* ===== FUNNEL ===== */
.funnel{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.fstep{display:flex;align-items:center;gap:12px}
.fn{font-size:.76rem;font-weight:700;width:130px;text-align:right;flex-shrink:0;color:var(--text)}
html[data-theme="dark"] .fn{color:var(--muted)}
.fbar{height:34px;border-radius:7px;display:flex;align-items:center;padding:0 12px;color:#fff;font-weight:800;font-size:.8rem;min-width:46px;font-family:var(--num-ff);transition:width .5s cubic-bezier(.4,0,.2,1)}
html[data-theme="dark"] .fbar{color:var(--brand-ink)}
.fp{width:42px;text-align:right;font-size:.74rem;color:var(--muted);font-weight:700;font-family:var(--num-ff)}

/* ===== TABLE ===== */
.tbl{width:100%;border-collapse:collapse;font-size:.82rem}
.tbl th{text-align:left;font-size:.61rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);padding:11px 11px;border-bottom:1px solid var(--line);white-space:nowrap}
html[data-theme="dark"] .tbl th{font-family:var(--mono);letter-spacing:1px}
.tbl th.r,.tbl td.r{text-align:right}
.tbl td{padding:13px 11px;border-bottom:1px solid var(--line2)}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background .12s}
.tbl tbody tr:hover{background:var(--bg)}
html[data-theme="dark"] .tbl tbody tr:hover{background:var(--card2)}
.who{display:flex;align-items:center;gap:10px}
.av{width:34px;height:34px;border-radius:9px;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:800;font-size:.78rem;flex-shrink:0}
/* vendor avatar — per-vendor color gradient + initials/photo */
.avatar{position:relative;border-radius:50%;display:grid;place-items:center;font-weight:800;color:#fff;flex-shrink:0;font-family:'Hanken Grotesk',sans-serif;letter-spacing:.01em;
  background:linear-gradient(140deg,var(--ac),color-mix(in srgb,var(--ac) 52%,#0A0E13));
  box-shadow:0 2px 7px color-mix(in srgb,var(--ac) 38%,transparent),inset 0 1px 0 rgba(255,255,255,.28)}
.avatar>span{line-height:1;text-shadow:0 1px 2px rgba(0,0,0,.28)}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}
.avatar.ring{box-shadow:0 0 0 2px var(--card),0 0 0 4px color-mix(in srgb,var(--ac) 50%,transparent),0 2px 8px color-mix(in srgb,var(--ac) 32%,transparent)}
html[data-theme="dark"] .avatar.ring{box-shadow:0 0 0 2px var(--card),0 0 0 4px color-mix(in srgb,var(--ac) 45%,transparent),0 0 15px color-mix(in srgb,var(--ac) 48%,transparent)}
.avatar .crown{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:linear-gradient(140deg,#FFD45E,#F5A301);color:#5A3E00;display:grid;place-items:center;border:2px solid var(--card);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.wn{font-weight:700;line-height:1.15}.ww{font-size:.69rem;color:var(--faint);font-weight:600}
.mbar{height:7px;background:var(--line2);border-radius:99px;overflow:hidden;width:68px;display:inline-block;vertical-align:middle;margin-right:8px}
.mbar i{display:block;height:100%;border-radius:99px;background:var(--brand)}
html[data-theme="dark"] .mbar i{box-shadow:0 0 8px rgba(22,200,191,.6)}
.tag-new{font-size:.6rem;color:var(--blue);font-weight:800;margin-left:6px;font-family:var(--num-ff)}

/* ===== PILLS ===== */
.pill{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:99px;font-family:var(--num-ff)}
html[data-theme="dark"] .pill{border-radius:6px}
.pill .pd{width:7px;height:7px;border-radius:50%}
.pill.green{color:var(--green-ink);background:var(--green-bg)}.pill.green .pd{background:var(--green)}
.pill.amber{color:var(--amber-ink);background:var(--amber-bg)}.pill.amber .pd{background:var(--amber)}
.pill.red{color:var(--red-ink);background:var(--red-bg)}.pill.red .pd{background:var(--red)}
.pill.brand{color:var(--brand-d);background:var(--brand-bg)}.pill.brand .pd{background:var(--brand)}

/* ===== INSIGHT ===== */
.insight{background:var(--brand-bg);border:1px solid rgba(0,181,173,.28);border-radius:var(--r);padding:18px;display:flex;gap:13px;align-items:flex-start}
.insight .ic{width:36px;height:36px;border-radius:10px;background:var(--brand);color:#fff;display:grid;place-items:center;flex-shrink:0}
html[data-theme="dark"] .insight .ic{color:var(--brand-ink);box-shadow:var(--glow)}
.insight .t{font-size:.94rem;font-weight:800;color:var(--brand-ink)}
html[data-theme="dark"] .insight .t{color:#7DEAE3}
.insight .d{font-size:.8rem;color:#2C5C58;margin-top:4px;line-height:1.5}
html[data-theme="dark"] .insight .d{color:#9FC9C5}
.insight b{color:inherit;font-weight:800}
.insight.amber{background:var(--amber-bg);border-color:rgba(217,131,0,.3)}
.insight.amber .ic{background:var(--amber)}
.insight.amber .t,.insight.amber .d{color:var(--amber-ink)}

/* ===== TEAM CARDS ===== */
.tcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;border-top:3px solid var(--line);transition:transform .18s ease,box-shadow .18s ease}
.tcard:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(15,22,32,.12)}
html[data-theme="dark"] .tcard:hover{box-shadow:0 10px 26px rgba(0,0,0,.45)}
.tcard.green{border-top-color:var(--green)}.tcard.amber{border-top-color:var(--amber)}.tcard.red{border-top-color:var(--red)}
.tcard-h{padding:16px 17px 13px;display:flex;align-items:center;gap:11px}
.tcard-name{font-weight:800;font-size:.92rem;line-height:1.15}
.tcard-where{font-size:.7rem;color:var(--faint);font-weight:600;margin-top:2px}
.tmetrics{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line2);border-top:1px solid var(--line2)}
.tm{background:var(--card);padding:13px 16px}
.tm .v{font-size:1.2rem;font-weight:800;line-height:1;font-family:var(--num-ff)}
.tm .l{font-size:.62rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:4px}
.tcard-bar{padding:11px 17px;background:var(--bg);border-top:1px solid var(--line2);display:flex;align-items:center;justify-content:space-between;font-size:.72rem;color:var(--muted)}
.tcard-bar b{color:var(--text);font-weight:800}

/* progress meter */
.meter{height:8px;background:var(--line2);border-radius:99px;overflow:hidden}
.meter i{display:block;height:100%;border-radius:99px}

/* segmented */
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.controls input,.controls select{font-family:inherit;font-size:.8rem;padding:7px 11px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--card);color:var(--text);outline:none}
.controls input:focus,.controls select:focus{border-color:var(--brand)}
.rc{font-size:.74rem;color:var(--muted);font-weight:600;margin-left:auto;white-space:nowrap}
.seg{display:inline-flex;background:var(--line2);border-radius:9px;padding:3px;gap:2px}
.seg button{border:none;background:none;font-family:inherit;font-weight:700;font-size:.74rem;color:var(--muted);padding:6px 14px;border-radius:7px;cursor:pointer}
.seg button.on{background:var(--card);color:var(--brand-d);box-shadow:var(--sh)}
html[data-theme="dark"] .seg button.on{background:var(--brand);color:var(--brand-ink)}

/* empty / placeholder note */
.note{font-size:.78rem;color:var(--muted);background:var(--bg);border:1px dashed var(--line);border-radius:var(--r);padding:14px 16px;line-height:1.55}

/* ===== brand logo in rail ===== */
.brand img.logo-img{height:30px;width:auto;display:block;filter:brightness(0) invert(1)}

/* ===== scroll progress + back-to-top ===== */
.scrollbar{position:fixed;top:0;left:230px;right:0;height:3px;background:linear-gradient(90deg,var(--brand),var(--blue));z-index:60;width:0;transition:width .08s linear;pointer-events:none}
html[data-theme="dark"] .scrollbar{box-shadow:0 0 10px var(--brand)}
.totop{position:fixed;bottom:22px;right:22px;width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--brand-d);display:grid;place-items:center;cursor:pointer;box-shadow:var(--sh);z-index:55;opacity:0;transform:translateY(10px);transition:.2s;pointer-events:none}
.totop.show{opacity:1;transform:none;pointer-events:auto}
.totop:hover{background:var(--brand);color:#fff;border-color:var(--brand)}
html[data-theme="dark"] .totop:hover{color:var(--brand-ink);box-shadow:0 0 18px rgba(22,200,191,.5)}

/* ===== presentation mode ===== */
body.pres .top .chip,body.pres .totop{display:none}
body.pres .kv{font-size:2.3rem}
body.pres .scroll{padding:32px 48px 60px}
body.pres .sh p{display:none}

/* ===== Presentación tab ===== */
@keyframes presIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.pres-vcard{border-top:3px solid var(--vc)!important;animation:presIn .45s ease both}
.pres-suc{border-top:3px solid var(--sc)!important;animation:presIn .45s ease both}
.pres-vendors{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.pres-sucs{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.pres-stats-grid{display:grid;grid-template-columns:repeat(5,1fr)}
@media(max-width:800px){.pres-stats-grid{grid-template-columns:repeat(3,1fr)}.pres-stats-grid>div:nth-child(3){border-right:none!important}.pres-stats-grid>div:nth-child(n+4){border-top:1px solid var(--line2)}}
@media(max-width:600px){.pres-vendors,.pres-sucs{grid-template-columns:1fr}.pres-stats-grid{grid-template-columns:repeat(2,1fr)}.pres-stats-grid>div:nth-child(2){border-right:none!important}.pres-stats-grid>div:nth-child(3){border-right:1px solid var(--line2)!important}.pres-stats-grid>div:nth-child(n+3){border-top:1px solid var(--line2)}}

/* ===== sparkline ===== */
.spark{display:block;width:100%;height:30px;margin-top:10px;overflow:visible}
.spark path.line{fill:none;stroke:var(--kc,var(--brand));stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.spark path.area{fill:var(--kc,var(--brand));opacity:.10}
.spark circle{fill:var(--kc,var(--brand))}
html[data-theme="dark"] .spark path.line{filter:drop-shadow(0 0 4px var(--kc,var(--brand)))}

/* ===== donut ===== */
.donut-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.donut{flex-shrink:0}
.donut .track{fill:none;stroke:var(--line2);stroke-width:14}
.donut .seg{fill:none;stroke-width:14;stroke-linecap:butt;transition:stroke-dasharray .6s cubic-bezier(.4,0,.2,1),stroke-width .18s ease,opacity .18s ease;cursor:default}
.donut-center{font-family:var(--num-ff);font-weight:800}
.legend{display:flex;flex-direction:column;gap:9px;flex:1;min-width:160px}
.legend .lr{display:flex;align-items:center;gap:9px;font-size:.78rem}
.legend .sw{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.legend .lv{margin-left:auto;font-weight:800;font-family:var(--num-ff)}

/* ===== heatmap ===== */
.heat{display:grid;gap:5px;margin-top:6px}
.heat .hrow{display:grid;grid-template-columns:150px repeat(var(--cols,4),1fr);gap:5px;align-items:center}
.heat .hname{font-size:.76rem;font-weight:600;display:flex;align-items:center;gap:9px}
.heat .cell{height:34px;border-radius:7px;display:grid;place-items:center;font-size:.72rem;font-weight:800;font-family:var(--num-ff);color:#fff}
.heat .hhead{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);text-align:center}
html[data-theme="dark"] .heat .hhead{font-family:var(--mono)}

/* ===== table: top row + critical rows + sticky head ===== */
.tbl thead th{position:sticky;top:-26px;background:var(--card);z-index:2}
body.pres .tbl thead th{top:-32px}
.tbl tr.toprow td{background:color-mix(in srgb,var(--brand) 8%,var(--card))}
.tbl tr.toprow:hover td{background:color-mix(in srgb,var(--brand) 13%,var(--card))}
.tbl tr.crit td:first-child{box-shadow:inset 3px 0 0 var(--red)}
.tbl tr.warn td:first-child{box-shadow:inset 3px 0 0 var(--amber)}

/* ===== tooltip ===== */
[data-tip]{position:relative}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 9px);left:50%;transform:translateX(-50%);background:#0C121C;color:#fff;padding:8px 12px;border-radius:8px;font-size:.7rem;font-weight:500;line-height:1.5;text-align:center;white-space:normal;width:max-content;max-width:230px;z-index:200;box-shadow:0 6px 20px rgba(0,0,0,.3);pointer-events:none}
[data-tip]:hover::before{content:"";position:absolute;bottom:calc(100% + 3px);left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#0C121C;z-index:200;pointer-events:none}

/* ===== empty state ===== */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;padding:46px 24px;text-align:center}
.empty-ic{width:58px;height:58px;border-radius:16px;display:grid;place-items:center;background:var(--bg);border:1px solid var(--line);color:var(--faint)}
.empty-t{font-weight:700;font-size:.92rem;color:var(--text)}
.empty-d{font-size:.8rem;color:var(--muted);max-width:40ch;line-height:1.5}
.empty .btn{margin-top:4px}

/* ===== skeleton ===== */
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:calc(200px + 100%) 0}}
.skel{border-radius:8px;background:var(--line2);background-image:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);background-size:200px 100%;background-repeat:no-repeat;animation:shimmer 1.1s infinite}
html[data-theme="dark"] .skel{background-image:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}

/* ===== diagnostic (clean, premium) ===== */
.diag2{display:grid;grid-template-columns:1.5fr 1fr;gap:30px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:30px 32px;position:relative;overflow:hidden;box-shadow:var(--sh)}
.diag2::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--brand),var(--blue))}
.diag2::after{content:"";position:absolute;right:-80px;top:-80px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--brand) 14%,transparent),transparent 70%);pointer-events:none}
html[data-theme="dark"] .diag2{background:linear-gradient(120deg,var(--card),#0E1822)}
.diag2-eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:.62rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--brand-d);background:var(--brand-bg);border:1px solid color-mix(in srgb,var(--brand) 30%,transparent);padding:5px 11px;border-radius:99px;margin-bottom:15px}
html[data-theme="dark"] .diag2-eyebrow{border-radius:6px;font-family:var(--mono)}
.diag2-h{font-size:1.55rem;font-weight:800;line-height:1.25;letter-spacing:-.4px;color:var(--text);text-wrap:balance}
.diag2-h em{font-style:normal;color:var(--brand-d);background:linear-gradient(transparent 60%,color-mix(in srgb,var(--brand) 28%,transparent) 60%)}
html[data-theme="dark"] .diag2-h em{background:none;color:var(--brand);text-shadow:0 0 16px rgba(22,200,191,.5)}
.diag2-p{font-size:.84rem;color:var(--muted);margin-top:13px;line-height:1.6;max-width:54ch}
.diag2-p b{color:var(--text);font-weight:700}
.diag2-cta{margin-top:16px;font-size:.78rem}

/* ===== resumen hero (factual, no slogan) ===== */
.rhero{display:grid;grid-template-columns:1.4fr 1fr;gap:30px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:26px 30px;position:relative;overflow:hidden;box-shadow:var(--sh)}
.rhero::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--brand),var(--blue))}
.rhero::after{content:"";position:absolute;right:-80px;top:-80px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--brand) 12%,transparent),transparent 70%);pointer-events:none}
html[data-theme="dark"] .rhero{background:linear-gradient(120deg,var(--card),#0E1822)}
.rhero-line{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-top:14px;font-size:1.05rem;color:var(--muted);font-weight:600}
.rhero-line b{font-size:1.7rem;font-weight:800;color:var(--text);letter-spacing:-.5px}
.rhero-sep{width:1px;height:20px;background:var(--line);align-self:center}
.rhero-sub{font-size:.78rem;color:var(--faint);margin-top:12px;line-height:1.5}
@media(max-width:820px){.rhero{grid-template-columns:1fr;gap:22px}}
.rhero-left{display:flex;flex-direction:column;justify-content:center;position:relative;z-index:1}
.rhero-stats{gap:8px}
.diag2-main{display:flex;flex-direction:column;justify-content:center;position:relative;z-index:1}
.diag2-stats{display:flex;flex-direction:column;gap:10px;position:relative;z-index:1}
.diag2-stat{display:flex;align-items:center;gap:13px;background:var(--bg);border:1px solid var(--line);border-left:3px solid var(--sc);border-radius:var(--r-sm);padding:13px 16px}
html[data-theme="dark"] .diag2-stat{background:rgba(255,255,255,.03)}
.diag2-ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:color-mix(in srgb,var(--sc) 14%,transparent);color:var(--sc);flex-shrink:0}
.diag2-v{font-size:1.35rem;font-weight:800;line-height:1;font-family:var(--num-ff);color:var(--text);white-space:nowrap}
.diag2-l{font-size:.66rem;color:var(--muted);font-weight:600;margin-top:4px}
@media(max-width:820px){.diag2{grid-template-columns:1fr;gap:22px}}
.diag2-refresh{border:none;background:var(--brand-bg);color:var(--brand-d);width:20px;height:20px;border-radius:6px;display:inline-grid;place-items:center;cursor:pointer;margin-left:4px;vertical-align:middle}
.diag2-refresh:hover{background:var(--brand);color:#fff}
.diag2-analyzing{display:flex;align-items:center;gap:7px;font-size:.78rem;color:#7A5AF0;font-weight:600;margin-top:12px}
html[data-theme="dark"] .diag2-analyzing{color:#A78BFA}
.diag2-skel-line{display:inline-block;width:90%;height:.85em;border-radius:5px;background:var(--line2);background-image:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);background-size:200px 100%;background-repeat:no-repeat;animation:shimmer 1.1s infinite;vertical-align:middle}
html[data-theme="dark"] .diag2-skel-line{background-image:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
.diag-levers{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}
@media(max-width:820px){.diag-levers{grid-template-columns:1fr}}
.diag-levers-col,.diag-risk{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh)}
.diag-risk{border-left:3px solid var(--red)}
.diag-risk-body{display:flex;align-items:flex-start;gap:10px;font-size:.86rem;color:var(--text);line-height:1.55;color:var(--red-ink)}

/* ===== AI expert agents ===== */
.agent-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
.agent{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:20px 22px;box-shadow:var(--sh);position:relative;overflow:hidden}
.agent::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ac)}
.agent-head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.agent-ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:color-mix(in srgb,var(--ac) 14%,transparent);color:var(--ac);flex-shrink:0}
.agent-name{font-weight:800;font-size:.96rem;letter-spacing:-.2px}
.agent-role{font-size:.68rem;color:var(--faint);font-weight:600;margin-top:1px}
.agent-refresh{border:none;background:var(--bg);color:var(--muted);width:30px;height:30px;border-radius:8px;display:grid;place-items:center;cursor:pointer;flex-shrink:0}
.agent-refresh:hover{background:var(--ac);color:#fff}
.agent-hint{font-size:.8rem;color:var(--muted);line-height:1.5;margin-top:6px}
.agent-loading{display:flex;align-items:center;gap:7px;font-size:.82rem;color:var(--ac);font-weight:600;margin-top:12px}
.agent-loading .ai-dot{background:var(--ac)}
.agent-body{margin-top:12px;animation:aiIn .4s ease-out}
.agent-resumen{font-size:.84rem;color:var(--text);line-height:1.55}
.agent-sec{margin-top:15px}
.agent-find{display:flex;align-items:flex-start;gap:9px;font-size:.81rem;color:var(--text);padding:6px 0;line-height:1.45}
.agent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.agent-rec{display:flex;align-items:flex-start;gap:10px;font-size:.82rem;color:var(--text);padding:7px 0;border-bottom:1px solid var(--line2);line-height:1.45}
.agent-rec:last-child{border-bottom:none}
.agent-impacto{font-size:.72rem;color:var(--brand-d);margin-top:3px;font-weight:600}

/* ===== count-up helper (no layout shift) ===== */
.kv,.ds .v,.tm .v{font-variant-numeric:tabular-nums}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== animated bar growth on view enter ===== */
@media (prefers-reduced-motion:no-preference){
  @keyframes growBar{from{transform:scaleY(0)}to{transform:scaleY(1)}}
  .bar-grow{transform-origin:bottom;animation:growBar .55s cubic-bezier(.4,0,.2,1)}
  @keyframes growW{from{width:0}}
  .view .meter i,.view .fbar,.view .bl-fill,.view .mbar i{animation:growW .6s cubic-bezier(.4,0,.2,1)}
}

/* ===== sortable table headers ===== */
.tbl th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
.tbl th.sortable:hover{color:var(--brand-d)}
.tbl th .sort-ar{display:inline-block;width:10px;opacity:.5;font-size:.7em}
.tbl th.sorted .sort-ar{opacity:1;color:var(--brand-d)}

/* ===== vendor-card weekly sparkline ===== */
.tcard-spark{display:flex;align-items:flex-end;gap:3px;height:24px;padding:0 17px 12px}
.tcard-spark i{flex:1;border-radius:2px 2px 0 0;background:var(--line);min-height:2px}
.tcard-spark i.hi{background:var(--brand)}
html[data-theme="dark"] .tcard-spark i.hi{box-shadow:0 0 6px rgba(22,200,191,.6)}

/* ===== quadrant matrix ===== */
.quad{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);height:360px;overflow:visible;box-shadow:var(--sh);padding:8px}
.quad-wrap{border-radius:var(--r);overflow:hidden}
.quad .axis{position:absolute;background:var(--line)}
.quad .axyx{left:50%;top:14px;bottom:14px;width:1px}
.quad .axxy{top:50%;left:14px;right:14px;height:1px}
.quad .qlbl{position:absolute;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);padding:10px 14px;pointer-events:none}
html[data-theme="dark"] .quad .qlbl{font-family:var(--mono)}
.quad .qpt{position:absolute;transform:translate(-50%,50%);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:transform .15s}
.quad .qpt:hover{transform:translate(-50%,50%) scale(1.1);z-index:6}
.quad .qpt .qnm{font-size:.6rem;font-weight:700;color:var(--text);white-space:nowrap;background:var(--card);padding:1px 6px;border-radius:5px;border:1px solid var(--line);box-shadow:var(--sh)}
.quad .axhint{position:absolute;font-size:.55rem;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.5px;pointer-events:none}
.quad .axhint-x{bottom:6px;left:50%;transform:translateX(-50%)}
.quad .axhint-y{left:4px;top:50%;writing-mode:vertical-rl;transform:translateY(-50%) rotate(180deg)}
html[data-theme="dark"] .quad .axhint{font-family:var(--mono)}

/* ===== filter chips (alertas) ===== */
.fchip{display:inline-flex;align-items:center;gap:7px;font-family:inherit;font-size:.76rem;font-weight:700;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:99px;padding:7px 14px;cursor:pointer;transition:.15s}
.fchip b{font-family:var(--num-ff);background:var(--bg);border-radius:99px;padding:0 7px;font-size:.7rem;color:var(--text)}
.fchip:hover{border-color:var(--fc);color:var(--fc)}
.fchip[data-on="true"]{background:color-mix(in srgb,var(--fc) 12%,transparent);border-color:var(--fc);color:var(--fc)}
.fchip[data-on="true"] b{background:var(--fc);color:#fff}

/* ===== AI analyst ===== */
.ai-box{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:22px 24px;box-shadow:var(--sh);position:relative;overflow:hidden}
.ai-box::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,#7A5AF0,var(--brand))}
.ai-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ai-badge{display:inline-flex;align-items:center;gap:7px;font-size:.62rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#7A5AF0;background:color-mix(in srgb,#7A5AF0 12%,transparent);border:1px solid color-mix(in srgb,#7A5AF0 30%,transparent);padding:5px 11px;border-radius:99px}
html[data-theme="dark"] .ai-badge{font-family:var(--mono);border-radius:6px;color:#A78BFA}
.ai-btn{font-size:.78rem}
.ai-hint{font-size:.82rem;color:var(--muted);margin-top:12px;line-height:1.55;max-width:70ch}
.ai-loading{display:flex;align-items:center;gap:7px;font-size:.84rem;color:var(--muted);margin-top:16px;font-weight:600}
.ai-dot{width:7px;height:7px;border-radius:50%;background:#7A5AF0;animation:aiPulse 1.2s infinite ease-in-out}
.ai-dot:nth-child(2){animation-delay:.2s}.ai-dot:nth-child(3){animation-delay:.4s;margin-right:6px}
@keyframes aiPulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
.ai-err{font-size:.8rem;color:var(--amber-ink);background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--r-sm);padding:12px 15px;margin-top:14px;line-height:1.5}
.ai-result{margin-top:16px;animation:aiIn .4s ease-out}
@keyframes aiIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.ai-titular{font-size:1.3rem;font-weight:800;letter-spacing:-.3px;color:var(--text);line-height:1.3;text-wrap:balance}
.ai-diag{font-size:.86rem;color:var(--muted);margin-top:10px;line-height:1.6;max-width:72ch}
.ai-palancas{margin-top:18px}
.ai-sub{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);margin-bottom:10px}
html[data-theme="dark"] .ai-sub{font-family:var(--mono)}
.ai-pal{display:flex;align-items:flex-start;gap:11px;font-size:.86rem;color:var(--text);padding:8px 0;border-bottom:1px solid var(--line2);line-height:1.5}
.ai-pal:last-child{border-bottom:none}
.ai-num{flex-shrink:0;width:22px;height:22px;border-radius:7px;background:var(--brand-bg);color:var(--brand-d);font-weight:800;font-size:.74rem;display:grid;place-items:center;font-family:var(--num-ff)}
.ai-riesgo{display:flex;align-items:center;gap:10px;margin-top:16px;background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--r-sm);padding:11px 15px;font-size:.82rem;color:var(--red-ink);line-height:1.5}
@media (prefers-reduced-motion:no-preference){
  @keyframes alertIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
  .alert-card{animation:alertIn .3s ease-out both}
  .alert-card:nth-child(2){animation-delay:.04s}.alert-card:nth-child(3){animation-delay:.08s}
  .alert-card:nth-child(4){animation-delay:.12s}.alert-card:nth-child(5){animation-delay:.16s}
  .alert-card:nth-child(6){animation-delay:.2s}.alert-card:nth-child(7){animation-delay:.24s}
}

/* ===== vendor profile drawer (fichas desplegables) ===== */
.scrim{position:fixed;inset:0;background:rgba(15,22,32,.45);opacity:0;pointer-events:none;transition:opacity .25s;z-index:70}
.scrim.show{opacity:1;pointer-events:auto}
html[data-theme="dark"] .scrim{background:rgba(0,0,0,.6)}
.drawer{position:fixed;top:0;right:0;height:100vh;width:520px;max-width:94vw;background:var(--bg);box-shadow:-12px 0 40px rgba(15,22,32,.25);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:71;display:flex;flex-direction:column}
.drawer.show{transform:none}
@media (prefers-reduced-motion:no-preference){
  @keyframes drSecIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .drawer.show .drawer-body>*{animation:drSecIn .35s ease-out both}
  .drawer.show .drawer-body>*:nth-child(2){animation-delay:.04s}
  .drawer.show .drawer-body>*:nth-child(3){animation-delay:.08s}
  .drawer.show .drawer-body>*:nth-child(4){animation-delay:.12s}
  .drawer.show .drawer-body>*:nth-child(5){animation-delay:.16s}
  .drawer.show .drawer-body>*:nth-child(6){animation-delay:.2s}
  .drawer.show .drawer-body>*:nth-child(n+7){animation-delay:.24s}
}
.drawer-head{background:var(--card);border-bottom:1px solid var(--line);padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.drawer-name{font-weight:800;font-size:1.1rem;letter-spacing:-.3px}
.drawer-close{border:none;background:var(--bg);width:34px;height:34px;border-radius:9px;font-size:1.3rem;color:var(--muted);cursor:pointer;line-height:1;flex-shrink:0}
.drawer-close:hover{background:var(--line);color:var(--text)}
.drawer-body{padding:20px 22px 40px;overflow-y:auto}
.dr-sec{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);margin:22px 0 11px}
.dr-sec:first-child{margin-top:0}
html[data-theme="dark"] .dr-sec{font-family:var(--mono)}
.dr-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.dr-k{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 14px}
.dr-k .v{font-size:1.2rem;font-weight:800;line-height:1;font-family:var(--num-ff)}
.dr-k .l{font-size:.64rem;color:var(--muted);font-weight:600;margin-top:5px;line-height:1.3}
.dr-mom{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 16px;display:flex;align-items:baseline;gap:10px}
.dr-mom .big{font-size:1.6rem;font-weight:800;font-family:var(--num-ff);line-height:1}
.clickable{cursor:pointer}

/* ===== editable metas stepper ===== */
.metas-box{display:flex;flex-direction:column;gap:16px}
.meta-row .top{display:flex;justify-content:space-between;align-items:center;font-size:.82rem;margin-bottom:7px;gap:10px;flex-wrap:wrap}
.meta-name{display:flex;align-items:center;gap:9px;font-weight:700}
.meta-right{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.meta-cerr{font-size:1rem;font-weight:800;font-family:var(--num-ff)}
.meta-proy{font-size:.72rem;color:var(--muted)}
.meta-stepper{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--card)}
.meta-stepper button{border:none;background:var(--bg);width:26px;height:28px;font-size:1rem;color:var(--muted);cursor:pointer;line-height:1;font-family:inherit;display:grid;place-items:center}
.meta-stepper button:hover{background:var(--brand);color:#fff}
.meta-pre{padding:0 1px 0 8px;color:var(--muted);font-size:.78rem;font-family:var(--num-ff)}
.meta-input{border:none;background:transparent;color:var(--text);font-family:var(--num-ff);font-weight:700;font-size:.82rem;width:78px;text-align:right;padding:5px 8px 5px 2px;outline:none}
.meta-input:focus{background:color-mix(in srgb,var(--brand) 10%,transparent)}
.meta-bar{height:11px;background:var(--line2);border-radius:99px;overflow:hidden;position:relative}
.meta-bar i{display:block;height:100%;border-radius:99px}
.meta-bar .proy{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink)}
html[data-theme="dark"] .meta-bar .proy{background:#fff;box-shadow:0 0 5px #fff}
.meta-total{border-top:2px solid var(--line);padding-top:14px;margin-top:2px}

/* ===== history dropdown ===== */
.hist{position:relative}
.hist-menu{position:absolute;top:calc(100% + 7px);right:0;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:0 10px 30px rgba(15,22,32,.18);min-width:170px;z-index:80;overflow:hidden;padding:5px}
html[data-theme="dark"] .hist-menu{box-shadow:0 10px 30px rgba(0,0,0,.5)}
.hist-menu a{display:flex;align-items:center;gap:9px;padding:9px 11px;font-size:.8rem;font-weight:600;color:var(--text);text-decoration:none;border-radius:7px}
.hist-menu a:hover{background:var(--bg);color:var(--brand-d)}
.hist-menu a.cur{color:var(--brand-d);background:var(--brand-bg)}
.hist-menu .lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);padding:6px 11px 4px}
html[data-theme="dark"] .hist-menu .lbl{font-family:var(--mono)}
/* subtle texture on the diagnostic banner (drop a real photo behind via --diag-photo) */
.diag{background-image:linear-gradient(118deg,#0F1620,#26303E),repeating-linear-gradient(135deg,rgba(255,255,255,.02) 0 2px,transparent 2px 9px)}
html[data-theme="dark"] .diag{background-image:linear-gradient(120deg,#0C1218,#10202A),repeating-linear-gradient(135deg,rgba(22,200,191,.03) 0 2px,transparent 2px 9px)}

/* ===== MOBILE RESPONSIVE ===== */
.mob-nav{display:none}
@media(max-width:768px){
  /* hide desktop rail, show full-width layout */
  .rail{display:none}
  body{display:block}
  .main{min-height:100dvh;display:flex;flex-direction:column}
  /* compact header on mobile */
  .top{padding:10px 14px;flex-wrap:wrap;gap:8px}
  .top h1{font-size:.9rem}
  .crumb{font-size:.58rem}
  /* hide heavy buttons on mobile header, keep only theme + refresh */
  .top .chip,.top .hist,.top .btn.pri{display:none}
  .top .btn[title="Modo presentación"]{display:none}
  /* content area with bottom padding for tab bar */
  .scroll{padding:16px 14px 80px;gap:18px}
  /* grids become single column */
  .grid2,.grid3,.kpis{grid-template-columns:1fr}
  /* cards: reduce padding */
  .card{padding:14px}
  /* drawer: full-screen on mobile */
  .drawer{width:100%;max-width:100%;border-radius:0}
  /* mobile bottom navigation bar */
  .mob-nav{
    display:flex;
    position:fixed;bottom:0;left:0;right:0;
    background:var(--rail);
    border-top:1px solid var(--rail-line);
    z-index:100;
    padding-bottom:env(safe-area-inset-bottom,0px);
  }
  .mob-nav button{
    flex:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;padding:9px 2px 7px;
    background:none;border:none;
    color:var(--rail-tx);
    font-size:.52rem;font-weight:700;
    text-transform:uppercase;letter-spacing:.4px;
    cursor:pointer;font-family:inherit;
    position:relative;
    transition:color .15s;
    white-space:nowrap;overflow:hidden;
  }
  .mob-nav button.active{color:var(--brand)}
  .mob-nav button .mob-bdg{
    position:absolute;top:6px;right:calc(50% - 14px);
    font-size:.55rem;font-weight:800;
    background:rgba(220,64,70,.92);color:#fff;
    border-radius:99px;padding:0 5px;
    font-family:var(--num-ff);line-height:1.6;
    min-width:16px;text-align:center;
  }
  /* mobile header: show brand name inline */
  .mob-brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:1rem;letter-spacing:1.5px;color:#fff;margin-right:auto}
  .mob-brand em{font-style:normal;color:var(--brand)}
}
@media(min-width:769px){
  .mob-brand{display:none}
}
